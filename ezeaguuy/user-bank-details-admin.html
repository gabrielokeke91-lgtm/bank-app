<!DOCTYPE html>
<html>
<head>

<title>Smartearn User Bank Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


*{

box-sizing:border-box;

}



body{


margin:0;



font-family:


"Segoe UI",
Arial,
sans-serif;



min-height:100vh;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;



}







/* BACKGROUND IMAGE */


body::before{


content:"";


position:fixed;



inset:0;



background:


url("/images/index3.jpeg")

center/cover no-repeat;



opacity:.3;



z-index:-1;



}







/* TOP BAR */


.topbar{


padding:20px;



text-align:center;



font-size:22px;



font-weight:bold;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



box-shadow:


0 0 25px cyan;



}







/* SEARCH AREA */


.searchBox{


margin:15px;



padding:15px;



display:flex;



gap:10px;



border-radius:20px;



background:


rgba(255,255,255,.15);



backdrop-filter:blur(15px);



border:


1px solid rgba(255,255,255,.3);



}







.searchBox input{


flex:1;



padding:13px;



border:none;



outline:none;



border-radius:20px;



font-size:14px;



}







.searchBox button{


padding:12px 18px;



border:none;



border-radius:20px;



background:


linear-gradient(
90deg,
#00ffcc,
#0072ff
);



color:white;



font-weight:bold;



}
/* USER BANK CARD */


.card{


margin:15px;



padding:18px;



border-radius:25px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


1px solid rgba(255,255,255,.35);



backdrop-filter:blur(15px);



box-shadow:


0 0 25px rgba(0,198,255,.4);



}





.card p{


margin:8px 0;



font-size:14px;



}



.card b{


color:#00ffff;



}








/* VIEW BUTTON */


.view{


width:100%;



padding:12px;



border:none;



border-radius:25px;



background:


linear-gradient(
90deg,
#00ff88,
#00c853
);



color:white;



font-weight:bold;



box-shadow:


0 0 20px #00ff88;



}



button:active{


transform:scale(.95);



}








/* WITHDRAWAL BUTTON AREA */


.bottom-actions{


margin:15px;



text-align:center;



}



.bottom-actions button{


width:100%;



padding:14px;



border:none;



border-radius:25px;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;



font-weight:bold;



font-size:15px;



box-shadow:


0 0 20px cyan;



}








/* POPUP BACKGROUND */


.popup{


display:none;



position:fixed;



top:0;



left:0;



width:100%;



height:100%;



background:


rgba(0,0,0,.75);



justify-content:center;



align-items:center;



z-index:9999;



}








/* POPUP BOX */


.popup-content{


width:90%;



max-width:380px;



padding:25px;



border-radius:25px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.95),
rgba(230,250,255,.95)
);



color:#111;



box-shadow:


0 0 35px cyan;



}







.popup-content h3{


text-align:center;



color:#0072ff;



font-size:20px;



}








/* CLOSE BUTTON */


.close{


width:100%;



padding:12px;



margin-top:15px;



border:none;



border-radius:25px;



background:


linear-gradient(
90deg,
#ff1744,
#ff5252
);



color:white;



font-weight:bold;



}








@media(max-width:600px){


.topbar{


font-size:19px;



}



.card{


margin:12px;



}


}
</style>
</head>
<body>


<div class="topbar">

🏦💎 User Bank Details Admin

</div>





<div class="searchBox">


<input 

id="searchPhone"

placeholder="📱 Search phone number">



<button onclick="search()">

SEARCH

</button>



</div>






<div class="bottom-actions">

<a href="withdrawals.html">

<button>

💸 Withdrawal Requests

</button>

</a>

</div>







<!-- USER BANK LIST -->

<div id="list">


<div class="card">


<p>

⏳ Loading users...

</p>


</div>



</div>








<!-- POPUP -->

<div class="popup" id="popup">


<div class="popup-content">



<h3>

🏦 Bank Details

</h3>



<div id="popupData">

</div>




<button class="close" onclick="closePopup()">

Close

</button>



</div>



</div>


<script>

const API = "https://smartearn.onrender.com";

function loadAll() {

    fetch(`${API}/ezeaguuy/all-users`)
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("list");
        list.innerHTML = "";

        data.forEach(user => {

            list.innerHTML += `
                <div class="card">
                    <p><b>Phone:</b> ${user.phone}</p>
                    <p><b>Status:</b> ${user.status || "active"}</p>

                    <button class="view"
                        onclick="viewDetails('${user.phone}')">
                        View Full Details
                    </button>
                </div>
            `;
        });

    })
    .catch(err => {
        console.log(err);
    });
}

// VIEW SINGLE USER BANK DETAILS
function viewDetails(phone) {

    fetch(`${API}/ezeaguuy/user-bank/${phone}`)
    .then(res => res.json())
    .then(data => {

        const box = document.getElementById("popupData");

        if (!data) {
            box.innerHTML = "<p>No bank details found</p>";
        } else {
            box.innerHTML = `
                <p><b>Phone:</b> ${phone}</p>
                <p><b>Bank Name:</b> ${data.bank_name}</p>
                <p><b>Account Name:</b> ${data.account_name}</p>
                <p><b>Account Number:</b> ${data.account_number}</p>
            `;
        }

        document.getElementById("popup").style.display = "flex";
    })
    .catch(err => {
        console.log(err);
    });
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

// SEARCH
function search(){

    const phone = document.getElementById("searchPhone").value.trim();

    if(!phone){
        loadAll();
        return;
    }

    fetch(`${API}/ezeaguuy/user-bank/${phone}`)
    .then(res => res.json())
    .then(data => {

        const list = document.getElementById("list");
        list.innerHTML = "";

        if(!data){
            list.innerHTML = "<div class='card'>No user found</div>";
            return;
        }

        list.innerHTML = `
            <div class="card">
                <p><b>Phone:</b> ${phone}</p>
                <p><b>Bank:</b> ${data.bank_name || "N/A"}</p>

                <button class="view" onclick="viewDetails('${phone}')">
                    View Full Details
                </button>
            </div>
        `;
    })
    .catch(err => {
        console.log(err);
    });
}

// INIT
loadAll();

</script>

</body>
</html>
