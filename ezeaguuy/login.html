<!DOCTYPE html>
<html>
<head>

<title>Smartearn Admin Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


*{

box-sizing:border-box;

}



body{


margin:0;



font-family:


"Segoe UI",
Arial,
sans-serif;



height:100vh;



display:flex;



justify-content:center;



align-items:center;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



overflow:hidden;



color:white;



}







/* BACKGROUND IMAGE */


body::before{


content:"";


position:absolute;



inset:0;



background:


url("/images/index2.jpeg")

center/cover no-repeat;



opacity:.35;



z-index:-1;



}








/* ADMIN CARD */


.container{


width:90%;



max-width:380px;



padding:30px;



border-radius:30px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


2px solid rgba(255,255,255,.35);



backdrop-filter:blur(18px);



box-shadow:


0 0 40px cyan,


inset 0 0 30px rgba(255,255,255,.2);



text-align:center;



position:relative;



overflow:hidden;



}








/* CRYSTAL SHINE */


.container::before{


content:"";


position:absolute;



width:80px;



height:220%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-120px;



top:-60px;



animation:


shine 5s infinite;



}





@keyframes shine{


0%{


left:-120px;


}


50%,100%{


left:420px;


}



}
/* TITLE */


h2{


font-size:26px;



margin-bottom:10px;



color:white;



text-shadow:


0 0 15px cyan;



}








/* DESCRIPTION */


p{


font-size:13px;



color:#e0f7ff;



margin-bottom:20px;



}








/* INPUTS */


input{


width:100%;



padding:14px;



margin:10px 0;



border:none;



outline:none;



border-radius:18px;



background:


rgba(255,255,255,.9);



color:#111;



font-size:14px;



box-shadow:


0 0 15px rgba(0,198,255,.4);



}



input:focus{


box-shadow:


0 0 25px cyan;



}








/* LOGIN BUTTON */


button{


width:100%;



padding:14px;



margin-top:15px;



border:none;



border-radius:25px;



background:


linear-gradient(
90deg,
#00ffcc,
#0072ff
);



color:white;



font-size:16px;



font-weight:bold;



box-shadow:


0 0 25px cyan;



cursor:pointer;



}



button:active{


transform:scale(.95);



}








/* MESSAGE */


#msg{


margin-top:15px;



font-size:14px;



font-weight:bold;



color:#ff8080;



}




@media(max-width:600px){


.container{


width:92%;



padding:25px;



}



h2{


font-size:22px;



}



}
</style>
</head>
<body>


<div class="container">



<h2>

🔐💎 Admin Login

</h2>





<p>

Secure SmartEarn Administration Portal

</p>







<input 

id="username"

placeholder="👤 Admin Username">







<input 

id="password"

type="password"

placeholder="🔒 Admin Password">







<button onclick="login()">

ENTER ADMIN PANEL

</button>







<p id="msg"></p>







</div>
<script>

const API = "https://smartearn.onrender.com";

async function login(){

    const phone = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const msg = document.getElementById("msg");
    msg.innerText = "Logging in...";

    try {

        const res = await fetch(`${API}/ezeaguuy/login`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ phone, password })
        });

        const data = await res.json().catch(() => null);

        if (res.ok && data?.success) {

            localStorage.setItem("ezeaguuyLoggedIn", "true");
            localStorage.setItem("ezeaguuyToken", data.token);
            localStorage.setItem("ezeaguuy", JSON.stringify(data.ezeaguuy));

            msg.style.color = "green";
            msg.innerText = "Login successful...";

            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 800);

        } else {
            msg.style.color = "red";
            msg.innerText = data?.error || "Invalid admin credentials";
        }

    } catch (error) {
        console.log(error);
        msg.style.color = "red";
        msg.innerText = "Server error. Try again.";
    }
}

</script>

</body>
</html>
