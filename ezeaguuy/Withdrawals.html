<!DOCTYPE html>
<html>
<head>
<title>Withdrawal Approval</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f5f7fb;
}

/* TOP BAR */
.topbar{
    background:linear-gradient(135deg,#0099ff,#0066ff);
    color:white;
    padding:15px;
    text-align:center;
    font-size:18px;
    font-weight:bold;
}

/* CARD */
.card{
    margin:12px;
    background:white;
    padding:12px;
    border-radius:12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

/* EACH WITHDRAWAL ITEM */
.item{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

/* BANK BOX */
.info{
    background:#f1f3f6;
    padding:8px;
    border-radius:10px;
    font-size:12px;
    margin-top:5px;
}

/* TEXT */
p{
    margin:5px 0;
    font-size:14px;
}

/* BUTTONS */
button{
    padding:8px 10px;
    border:none;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
    margin:3px;
}

.approve{
    background:#00c853;
    color:white;
}

.reject{
    background:#ff4d4d;
    color:white;
}

/* BACK BUTTON */
.bottom{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    display:flex;
}

.bottom a{
    flex:1;
}

.bottom button{
    width:100%;
    border-radius:0;
    background:#0099ff;
    color:white;
    padding:12px;
}
</style>
</head>

<body>

<div class="topbar">
Withdrawal Approval Panel
</div>

<div class="card" id="data"></div>

<!-- BACK -->
<div class="bottom">
<a href="dashboard.html">
<button>⬅️ admin Dashboard</button>
</a>
</div>

<script>

const API = "https://mobile-wealth-api.onrender.com";

function load() {

    fetch(`${API}/ezeaguuy/withdrawals`)
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("data");
        container.innerHTML = "";

        data.forEach(item => {

            container.innerHTML += `
            <div class="item">

                <p><b>Phone:</b> ${item.phone}</p>
                <p><b>Amount:</b> ₦${item.amount}</p>
                <p><b>Status:</b> ${item.status}</p>

                <div class="info">
                    <b>${item.account_name || 'No bank set'}</b><br>
                    ${item.bank_name || ''}<br>
                    ${item.account_number || ''}
                </div>

                <div class="bottom-actions">
                    <a href="user-bank-details-admin.html">
                        <button>User Bank details</button>
                    </a>
                </div>

                <div style="margin-top:8px;">

                    <button class="approve" onclick="approve(${item.id})">Approve</button>
                    <button class="reject" onclick="reject(${item.id})">Reject</button>
                </div>

            </div>
            `;
        });

    })
    .catch(err => console.log(err));
}

function approve(id){
    fetch(`${API}/ezeaguuy/withdrawals/approve`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    })
    .then(()=>load());
}

function reject(id){
    fetch(`${API}/ezeaguuy/withdrawals/reject`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    })
    .then(()=>load());
}

load();

</script>

</body>
</html>
