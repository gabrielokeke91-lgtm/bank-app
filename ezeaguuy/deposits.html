<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smartearn Deposit Approval</title>


<style>


*{

box-sizing:border-box;

}



body{


margin:0;



font-family:


"Segoe UI",
Arial,
sans-serif;



min-height:100vh;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;



padding-bottom:80px;



}








/* BACKGROUND IMAGE */


body::before{


content:"";


position:fixed;



inset:0;



background:


url("/images/index3.jpeg")

center/cover no-repeat;



opacity:.3;



z-index:-1;



}








/* HEADER */


.header{


position:sticky;



top:0;



z-index:10;



padding:20px;



text-align:center;



font-size:22px;



font-weight:bold;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



box-shadow:


0 0 25px cyan;



}








/* CONTAINER */


.container{


padding:15px;



}








/* DEPOSIT CARD */


.card{


position:relative;



padding:18px;



margin-bottom:18px;



border-radius:25px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


1px solid rgba(255,255,255,.35);



backdrop-filter:blur(15px);



box-shadow:


0 0 25px rgba(0,198,255,.45),


inset 0 0 20px rgba(255,255,255,.15);



overflow:hidden;



}

/* CARD SHINE EFFECT */


.card::before{


content:"";


position:absolute;



width:80px;



height:220%;



background:


rgba(255,255,255,.25);



transform:


rotate(35deg);



left:-120px;



top:-60px;



animation:


shine 5s infinite;



}



@keyframes shine{


0%{


left:-120px;


}



50%,100%{


left:450px;


}



}








/* TEXT */


p{


margin:8px 0;



font-size:14px;



color:#e0f7ff;



}



p b{


color:#00ffff;



}








/* RECEIPT IMAGE */


img{


width:100%;



margin-top:12px;



border-radius:18px;



border:


2px solid rgba(255,255,255,.4);



box-shadow:


0 0 20px cyan;



}








/* BUTTON AREA */


.buttons{


display:flex;



gap:10px;



margin-top:15px;



}





button{


flex:1;



padding:12px;



border:none;



border-radius:25px;



font-size:14px;



font-weight:bold;



color:white;



cursor:pointer;



}



.approve{


background:


linear-gradient(
90deg,
#00ff88,
#00c853
);



box-shadow:


0 0 20px #00ff88;



}




.reject{


background:


linear-gradient(
90deg,
#ff1744,
#ff5252
);



box-shadow:


0 0 20px red;



}




button:active{


transform:scale(.95);



}








/* BOTTOM ADMIN BUTTON */


.bottom{


position:fixed;



bottom:0;



left:0;



right:0;



padding:10px;



background:


rgba(0,0,0,.45);



backdrop-filter:blur(10px);



}



.bottom a{


text-decoration:none;



}



.bottom button{


width:100%;



padding:14px;



border-radius:25px;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;



font-size:15px;



box-shadow:


0 0 25px cyan;



}




@media(max-width:600px){


.header{


font-size:20px;



}



.card{


padding:15px;



}



}
</style>
</head>
<body>


<div class="header">

💎 Deposit Approval Panel

</div>





<div class="container" id="deposits">


<div class="card">


<p>

⏳ Loading deposit requests...

</p>



</div>


</div>








<div class="bottom">


<a href="dashboard.html">


<button>

⬅️ Admin Dashboard

</button>


</a>



</div>

<script>

const API = "https://smartearn.onrender.com";

document.addEventListener("DOMContentLoaded", loadDeposits);

async function loadDeposits() {

    try {
        const res = await fetch(`${API}/ezeaguuy/deposits`);
        const data = await res.json();

        const container = document.getElementById("deposits");
        container.innerHTML = "";

        data.forEach(dep => {

            container.innerHTML += `
                <div class="card">

                    <p><b>Phone:</b> ${dep.phone}</p>
                    <p><b>Amount:</b> ₦${dep.amount}</p>
                    <p><b>Status:</b> ${dep.status}</p>

                    ${dep.receipt ? `
                        <img src="${API}/uploads/${dep.receipt}" />
                    ` : ""}

                    <div class="buttons">
                        <button class="approve" onclick="approve(${dep.id})">Approve</button>
                        <button class="reject" onclick="reject(${dep.id})">Reject</button>
                    </div>

                </div>
            `;
        });

    } catch (err) {
        console.log("Error loading deposits:", err);
    }
}

function approve(id){
    fetch(`${API}/ezeaguuy/deposit/approve`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    }).then(()=>loadDeposits());
}

function reject(id){
    fetch(`${API}/ezeaguuy/deposit/reject`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    }).then(()=>loadDeposits());
}

</script>

</body>
</html>
