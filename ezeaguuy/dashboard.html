<!DOCTYPE html>
<html>
<head>

<title>Smartearn Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


*{

box-sizing:border-box;

}



body{


margin:0;



font-family:


"Segoe UI",
Arial,
sans-serif;



min-height:100vh;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;



padding-bottom:90px;



overflow-x:hidden;



}








/* BACKGROUND IMAGE */


body::before{


content:"";


position:fixed;



inset:0;



background:


url("/images/index3.jpeg")

center/cover no-repeat;



opacity:.3;



z-index:-1;



}








/* TOP BAR */


.topbar{


padding:22px;



text-align:center;



font-size:24px;



font-weight:bold;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



box-shadow:


0 0 30px cyan;



text-shadow:


0 0 15px white;



}








/* ADMIN CARD */


.card{


margin:15px;



padding:18px;



border-radius:30px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


1px solid rgba(255,255,255,.35);



backdrop-filter:blur(15px);



box-shadow:


0 0 30px rgba(0,198,255,.5),


inset 0 0 25px rgba(255,255,255,.15);



}








.card h3{


color:#00ffff;



text-align:center;



font-size:20px;



text-shadow:


0 0 10px cyan;



}
/* TABLE WRAPPER */


table{


width:100%;



border-collapse:collapse;



font-size:13px;



overflow:hidden;



}




thead{


background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



}




th{


padding:12px;



color:white;



text-align:left;



}




td{


padding:12px;



border-bottom:


1px solid rgba(255,255,255,.2);



color:#e0f7ff;



}




tbody tr:hover{


background:


rgba(0,198,255,.15);



}








/* STATUS COLORS */


.suspend{


background:


linear-gradient(
90deg,
#ff1744,
#ff5252
);



color:white;



}



.activate{


background:


linear-gradient(
90deg,
#00ff88,
#00c853
);



color:white;



}








/* ALL BUTTONS */


button{


padding:10px 12px;



border:none;



border-radius:20px;



font-size:12px;



font-weight:bold;



cursor:pointer;



}



button:active{


transform:scale(.95);



}








/* LOGOUT BUTTON */


.logout{


position:fixed;



top:12px;



right:12px;



padding:10px 16px;



background:


linear-gradient(
90deg,
#ff1744,
#ff5252
);



color:white;



border-radius:25px;



font-size:12px;



font-weight:bold;



box-shadow:


0 0 20px red;



z-index:9999;



text-decoration:none;



}








/* BOTTOM ADMIN MENU */


.bottom-actions{


position:fixed;



bottom:0;



left:0;



right:0;



display:flex;



gap:5px;



padding:8px;



background:


rgba(0,0,0,.55);



backdrop-filter:blur(15px);



overflow-x:auto;



z-index:9999;



}




.bottom-actions a{


min-width:110px;



text-decoration:none;



}



.bottom-actions button{


width:100%;



padding:12px;



border-radius:20px;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;



font-size:11px;



box-shadow:


0 0 15px cyan;



}




/* MOBILE TABLE */


@media(max-width:600px){



.card{


margin:10px;



padding:12px;



}



table{


font-size:11px;



}



th,td{


padding:8px;



}



.topbar{


font-size:20px;



}



}
</style>
</head>
<body>


<div class="topbar">

💎 SmartEarn Admin Dashboard

</div>








<a href="login.html" class="logout">

🚪 Logout

</a>








<div class="card">


<h3>

👥 All Users

</h3>





<table>


<thead>


<tr>

<th>Phone</th>

<th>Balance</th>

<th>Status</th>

<th>Action</th>

</tr>


</thead>





<tbody id="users">


<tr>

<td colspan="4">

⏳ Loading users...

</td>

</tr>



</tbody>



</table>



</div>








<div class="bottom-actions">


<a href="/ezeaguuy/withdrawals.html">

<button>

💸 Withdrawals

</button>

</a>



<a href="/ezeaguuy/deposits.html">

<button>

💰 Deposits

</button>

</a>



<a href="/ezeaguuy/user-bank-details-admin.html">

<button>

🏦 Bank

</button>

</a>



<a href="/ezeaguuy/admin-bonus.html">

<button>

🎁 Bonus

</button>

</a>



<a href="/ezeaguuy/admin-user-control.html">

<button>

👤 Control

</button>

</a>



<a href="/ezeaguuy/investments.html">

<button>

📊 Investments

</button>

</a>



</div>

<script>

const API = "https://smartearn.onrender.com";

async function loadUsers() {

    try {

        const res = await fetch(`${API}/ezeaguuy/users`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        });

        const data = await res.json().catch(() => []);

        const tbody = document.getElementById("users");
        tbody.innerHTML = "";

        data.forEach(user => {

            tbody.innerHTML += `
                <tr>
                    <td>${user.phone}</td>
                    <td>₦${user.balance || 0}</td>
                    <td>${user.status || "active"}</td>
                    <td>
                        <button onclick="toggleUser(${user.id})"
                            class="${user.status === 'active' ? 'suspend' : 'activate'}">
                            ${user.status === 'active' ? 'Suspend' : 'Activate'}
                        </button>
                    </td>
                </tr>
            `;
        });

    } catch (err) {
        console.log(err);
        alert("Server error");
    }
}

async function toggleUser(id){

    try {
        await fetch(`${API}/ezeaguuy/toggle-user-status`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                id,
                status: "toggle"
            })
        });

        loadUsers();

    } catch (err) {
        console.log(err);
        alert("Failed to update user");
    }
}

document.addEventListener("DOMContentLoaded", loadUsers);

</script>

</body>
</html>
