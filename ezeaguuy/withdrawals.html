<!DOCTYPE html>
<html>
<head>

<title>Smartearn Withdrawal Approval</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


*{

box-sizing:border-box;

}



body{


margin:0;


font-family:


"Segoe UI",
Arial,
sans-serif;



min-height:100vh;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;



overflow-x:hidden;



}







/* BACKGROUND EFFECT */


body::before{


content:"";


position:absolute;


inset:0;



background:


url("/images/index3.jpeg")

no-repeat center;



background-size:cover;



opacity:.3;



z-index:-1;



}







/* TOP BAR */


.topbar{


padding:20px;



text-align:center;



font-size:22px;



font-weight:bold;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



box-shadow:


0 0 25px cyan;



}








/* MAIN CARD */


.card{


margin:20px auto;



width:92%;



max-width:600px;



padding:18px;



border-radius:30px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


2px solid rgba(255,255,255,.4);



backdrop-filter:blur(18px);



box-shadow:


0 0 35px rgba(0,198,255,.6),


inset 0 0 25px rgba(255,255,255,.2);



}
/* WITHDRAWAL ITEM */


.item{


position:relative;



padding:15px;



margin-bottom:15px;



border-radius:20px;



background:


rgba(255,255,255,.12);



border:


1px solid rgba(255,255,255,.25);



box-shadow:


0 0 15px rgba(0,198,255,.3);



}







.item p{


margin:7px 0;



font-size:14px;



color:white;



}





.item b{


color:#00ffff;



}








/* BANK INFO */


.info{


margin-top:10px;



padding:12px;



border-radius:15px;



background:


rgba(0,0,0,.25);



font-size:13px;



line-height:1.6;



color:#e0f7ff;



}







/* BUTTON AREA */


button{


padding:10px 15px;



border:none;



border-radius:20px;



font-size:13px;



font-weight:bold;



cursor:pointer;



margin:5px;



}



.approve{


background:


linear-gradient(
90deg,
#00ff88,
#00c853
);



color:white;



box-shadow:


0 0 15px #00ff88;



}



.reject{


background:


linear-gradient(
90deg,
#ff1744,
#ff5252
);



color:white;



box-shadow:


0 0 15px #ff1744;



}



button:active{


transform:scale(.95);



}







/* BOTTOM ADMIN BUTTON */


.bottom{


position:fixed;



bottom:0;



left:0;



right:0;



padding:10px;



background:


rgba(0,0,0,.4);



backdrop-filter:blur(10px);



}



.bottom a{


text-decoration:none;



}



.bottom button{


width:100%;



padding:14px;



border-radius:25px;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;



font-size:14px;



box-shadow:


0 0 25px cyan;



}




@media(max-width:600px){


.card{


width:94%;



}



.topbar{


font-size:20px;



}



}
</style>
</head>

<body>



<div class="topbar">

💎 Withdrawal Approval Panel

</div>







<div class="card" id="data">


<div class="item">


<p>

⏳ Loading withdrawal requests...

</p>


</div>



</div>








<div class="bottom">


<a href="dashboard.html">


<button>

⬅️ Admin Dashboard

</button>


</a>



</div>


<script>

const API = "https://smartearn.onrender.com";

function load() {

    fetch(`${API}/ezeaguuy/withdrawals`)
    .then(res => res.json())
    .then(data => {

        const container = document.getElementById("data");
        container.innerHTML = "";

        data.forEach(item => {

            container.innerHTML += `
            <div class="item">

                <p><b>Phone:</b> ${item.phone}</p>
                <p><b>Amount:</b> ₦${item.amount}</p>
                <p><b>Status:</b> ${item.status}</p>

                <div class="info">
                    <b>${item.account_name || 'No bank set'}</b><br>
                    ${item.bank_name || ''}<br>
                    ${item.account_number || ''}
                </div>

                <div class="bottom-actions">
                    <a href="user-bank-details-admin.html">
                        <button>User Bank details</button>
                    </a>
                </div>

                <div style="margin-top:8px;">

                    <button class="approve" onclick="approve(${item.id})">Approve</button>
                    <button class="reject" onclick="reject(${item.id})">Reject</button>
                </div>

            </div>
            `;
        });

    })
    .catch(err => console.log(err));
}

function approve(id){
    fetch(`${API}/ezeaguuy/withdrawals/approve`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    })
    .then(()=>load());
}

function reject(id){
    fetch(`${API}/ezeaguuy/withdrawals/reject`, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({id})
    })
    .then(()=>load());
}

load();

</script>

</body>
</html>
