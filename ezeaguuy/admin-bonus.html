<!DOCTYPE html>
<html>
<head>

<title>Admin Bonus Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    font-family:Arial,sans-serif;

    background:

    linear-gradient(135deg,#0b0f2f,#182848);

    color:white;

    padding-bottom:80px;

}



/* HEADER */

.header{

    background:

    linear-gradient(90deg,#00c6ff,#0072ff);

    padding:20px;

    text-align:center;

    font-size:20px;

    font-weight:bold;

    box-shadow:

    0 5px 20px rgba(0,0,0,.5);

}




/* CONTAINER */

.container{

    padding:15px;

}




/* CRYSTAL CARD */

.card{

    background:

    linear-gradient(

    145deg,

    rgba(255,255,255,.35),

    rgba(255,255,255,.05)

    );


    border:

    2px solid rgba(255,255,255,.35);


    padding:20px;


    border-radius:25px;


    backdrop-filter:blur(15px);


    box-shadow:

    0 0 25px rgba(0,198,255,.5),

    inset 0 0 20px rgba(255,255,255,.2);

}





/* LABEL */

label{

    display:block;

    margin-top:10px;

    margin-bottom:5px;

    color:#00ffff;

    font-weight:bold;

    font-size:14px;

}





/* INPUT */

input{

    width:100%;

    padding:14px;

    margin-bottom:15px;

    border:none;

    border-radius:15px;

    outline:none;

    font-size:14px;


    background:

    rgba(255,255,255,.9);

}




/* GENERATE BUTTON */

button{

    width:100%;

    padding:14px;

    border:none;

    border-radius:25px;


    background:

    linear-gradient(90deg,#00ffcc,#0072ff);


    color:white;

    font-size:15px;

    font-weight:bold;


    box-shadow:

    0 0 20px cyan;


    cursor:pointer;

}



button:active{

    transform:scale(.95);

}





/* RESULT */

.result{

    margin-top:15px;

    padding:15px;


    border-radius:15px;


    background:

    rgba(0,255,204,.15);


    border:

    1px solid cyan;


    font-size:14px;

}





/* HOME BUTTON */

.home-btn{


    position:fixed;


    bottom:15px;


    left:50%;


    transform:translateX(-50%);


    background:

    linear-gradient(90deg,#00c6ff,#0072ff);


    color:white;


    padding:14px 30px;


    border-radius:30px;


    text-decoration:none;


    font-size:14px;


    font-weight:bold;


    box-shadow:

    0 0 20px cyan;


    z-index:9999;

}




@media(max-width:600px){


.header{

    font-size:18px;

}


.card{

    padding:15px;

}


}


</style>

</head>



<body>



<div class="header">

🎁 Bonus Code Generator (Admin)

</div>





<div class="container">


<div class="card">



<label>
💰 Bonus Amount
</label>


<input 
type="number" 
id="amount" 
placeholder="Enter amount e.g 5000">





<label>
👥 Number of Users Allowed
</label>


<input 
type="number" 
id="users" 
placeholder="e.g 10 users">





<label>
⏳ Expiry Hours
</label>


<input 
type="number" 
id="hours" 
placeholder="e.g 1">





<label>
⏳ Expiry Minutes
</label>


<input 
type="number" 
id="minutes" 
placeholder="e.g 30">





<button onclick="generateBonus()">

🎁 Generate Code

</button>




<div 
class="result" 
id="resultBox" 
style="display:none;">

</div>



</div>


</div>





<a href="dashboard.html" class="home-btn">

🏠 Home

</a>


<script>

const API = "https://smartearn.onrender.com";

async function generateBonus() {

    const amount = document.getElementById("amount").value;
    const users = document.getElementById("users").value;
    const hours = document.getElementById("hours").value || 0;
    const minutes = document.getElementById("minutes").value || 0;

    if (!amount || !users) {
        alert("Amount and users are required");
        return;
    }

    try {
        const res = await fetch(`${API}/ezeaguuy/create-bonus`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                amount: Number(amount),
                maxUsers: Number(users),
                expiryHours: Number(hours),
                expiryMinutes: Number(minutes)
            })
        });

        const data = await res.json();

        document.getElementById("resultBox").style.display = "block";
        document.getElementById("resultBox").innerHTML = `
            🎉 <b>Bonus Code Created!</b><br><br>
            Code: <b>${data.code}</b><br>
            Amount: ₦${data.amount}<br>
            Max Users: ${data.maxUsers}<br>
            Expires At: ${data.expiresAt}
        `;

    } catch (err) {
        console.log(err);
        alert("Failed to generate bonus code");
    }
}

</script>

</body>
</html>
