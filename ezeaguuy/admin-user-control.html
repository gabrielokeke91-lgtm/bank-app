<!DOCTYPE html>
<html>
<head>
<title>User Control Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    font-family:Arial, sans-serif;

    background:
    linear-gradient(135deg,#0b0f2f,#182848);

    color:white;

    padding-bottom:80px;

}


/* HEADER */

.header{

    background:
    linear-gradient(90deg,#00c6ff,#0072ff);

    color:white;

    padding:18px;

    font-size:20px;

    font-weight:bold;

    text-align:center;

    box-shadow:
    0 5px 20px rgba(0,0,0,.5);

}



/* TABLE */

table{

    width:95%;

    margin:20px auto;

    border-collapse:collapse;

    background:

    rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    border-radius:20px;

    overflow:hidden;

    box-shadow:

    0 0 25px rgba(0,198,255,.5);

}



th{

    background:

    rgba(0,198,255,.7);

    padding:14px;

    text-align:left;

    font-size:13px;

}



td{

    padding:12px;

    border-bottom:

    1px solid rgba(255,255,255,.15);

    font-size:13px;

}



tr:hover{

    background:

    rgba(255,255,255,.1);

}



/* BUTTON */

button{

    padding:8px 14px;

    border:none;

    border-radius:20px;

    font-size:12px;

    font-weight:bold;

    cursor:pointer;

}


button:active{

    transform:scale(.95);

}



/* LOCK BUTTON */

.lock{

    background:

    linear-gradient(90deg,#ff1744,#ff5252);

    color:white;

    box-shadow:

    0 0 15px red;

}



/* UNLOCK BUTTON */

.unlock{

    background:

    linear-gradient(90deg,#00ff88,#00c853);

    color:white;

    box-shadow:

    0 0 15px lime;

}



/* BACK BUTTON */

.bottom{

    position:fixed;

    bottom:0;

    left:0;

    right:0;

    padding:8px;

    background:

    rgba(0,0,0,.6);

    backdrop-filter:blur(15px);

    z-index:9999;

}



.bottom a{

    text-decoration:none;

}



.bottom button{

    width:100%;

    background:

    linear-gradient(90deg,#00c6ff,#0072ff);

    color:white;

    padding:14px;

    border-radius:25px;

    box-shadow:

    0 0 15px cyan;

}



/* MOBILE */

@media(max-width:600px){


table{

    width:98%;

}


th,td{

    padding:10px;

    font-size:11px;

}


.header{

    font-size:18px;

}


}

</style>

</head>


<body>


<div class="header">

🔐 User Access Control

</div>



<table>

<thead>

<tr>

<th>📱 Phone</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>


<tbody id="users">

</tbody>


</table>




<div class="bottom">

<a href="dashboard.html">

<button>

⬅️ Admin Dashboard

</button>

</a>

</div>


<script>

const API = "https://smartearn.onrender.com";

// LOAD USERS
async function loadUsers() {

    try {
        const res = await fetch(`${API}/ezeaguuy/all-users`);

        if (!res.ok) {
            throw new Error("Failed to load users: " + res.status);
        }

        const data = await res.json();

        const tbody = document.getElementById("users");
        tbody.innerHTML = "";

        data.forEach(user => {

            tbody.innerHTML += `
                <tr>
                    <td>${user.phone}</td>
                    <td>${user.status || "active"}</td>
                    <td>
                        <button 
                            class="${user.status === 'active' ? 'lock' : 'unlock'}"
                            onclick="toggleUser(${user.id}, '${user.status}')">
                            ${user.status === 'active' ? 'Lock' : 'Unlock'}
                        </button>
                    </td>
                </tr>
            `;
        });

    } catch (err) {
        console.log("Load users error:", err);
        alert("Failed to load users");
    }
}

// TOGGLE USER STATUS
async function toggleUser(id, status) {

    try {
        const newStatus = status === "active" ? "locked" : "active";

        const res = await fetch(`${API}/ezeaguuy/toggle-user-status`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, status: newStatus })
        });

        if (!res.ok) {
            throw new Error("Failed to update user");
        }

        loadUsers();

    } catch (err) {
        console.log("Toggle error:", err);
        alert("Failed to update user status");
    }
}

document.addEventListener("DOMContentLoaded", loadUsers);

</script>

</body>
</html>
