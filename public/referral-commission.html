<!DOCTYPE html>
<html>
<head>
<title>Smartearn Referral Earnings</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
box-sizing:border-box;
}



body{


margin:0;


font-family:


"Segoe UI",
Arial,
sans-serif;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;


overflow-x:hidden;



}






/* TOP BAR */


.topbar{


background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;


padding:22px;



text-align:center;


font-size:20px;


font-weight:bold;



box-shadow:


0 0 25px cyan;



}








/* REFERRAL CARD */


.card{


position:relative;


background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



margin:15px;


padding:18px;



border-radius:25px;



border:


2px solid rgba(255,255,255,.35);




backdrop-filter:blur(15px);



box-shadow:


0 0 25px rgba(0,198,255,.45),


inset 0 0 20px rgba(255,255,255,.15);



overflow:hidden;



}





/* CRYSTAL LIGHT EFFECT */


.card::before{


content:"";


position:absolute;


width:80px;


height:200%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-120px;



top:-50px;



animation:


shine 5s infinite;



}




@keyframes shine{


0%{

left:-120px;

}


50%,100%{

left:350px;

}


}




/* TEXT */


p{


margin:8px 0;


font-size:14px;


color:white;



}



.amount{


color:#00ff88;


font-weight:bold;


font-size:18px;



text-shadow:


0 0 10px #00ff88;



}

/* COMMISSION CONTAINER */

#commission{

    padding:10px;

}





/* EARNING ICON */

.earning-icon{

    font-size:40px;

    text-align:center;

    filter:

    drop-shadow(0 0 15px cyan);

}






/* BOTTOM NAV */


.bottom-nav{


    position:fixed;


    bottom:0;


    left:0;


    right:0;



    display:flex;


    justify-content:space-around;



    padding:10px 5px;



    background:


    rgba(255,255,255,.9);



    backdrop-filter:blur(15px);



    box-shadow:


    0 -5px 25px rgba(0,198,255,.5);



    z-index:9999;



}





.bottom-nav a{


    flex:1;


    text-align:center;


    text-decoration:none;


    color:#0072ff;


    font-size:11px;


    font-weight:bold;



}





.bottom-nav span{


    display:block;


    font-size:18px;


    margin-bottom:3px;



}





.space{


    height:90px;



}





@media(max-width:600px){


.topbar{


font-size:18px;


}



.card{


margin:12px;


padding:15px;


}



}

</style>
</head>
<body>


<div class="topbar">

🎁💎 Referral Commission History 💎🎁

</div>





<div id="commission">


<!-- Example loading card -->

<div class="card">


<div class="earning-icon">

🔗💰

</div>



<p>

Loading referral earnings...

</p>



</div>



</div>








<div class="space"></div>







<!-- BOTTOM NAV -->


<div class="bottom-nav">


<a href="dashboard.html">

<span>
🏠
</span>

HOME

</a>




<a href="deposit.html">

<span>
💰
</span>

DEPOSIT

</a>




<a href="products.html">

<span>
💎
</span>

PRODUCTS

</a>




<a href="Transactions.html">

<span>
📊
</span>

HISTORY

</a>




<a href="login.html">

<span>
🚪
</span>

EXIT

</a>



</div>

<script>

const API = "https://smartearn.onrender.com";

const user = JSON.parse(localStorage.getItem("user"));

if (!user || !user.id) {
    window.location.href = "login.html";
}

async function load() {

    try {

        const res = await fetch(`${API}/referral-commission/${user.id}`);
        const data = await res.json();

        const container = document.getElementById("commission");
        container.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            container.innerHTML = "<p style='text-align:center;'>Refer to get bonus commission</p>";
            return;
        }

        data.forEach(item => {

            container.innerHTML += `
                <div class="card">
                    <p>👤 ${item.referred_user}</p>
                    <p>💰 Deposit: ₦${Number(item.deposit_amount || 0).toFixed(2)}</p>
                    <p class="amount">🎁 Commission: ₦${Number(item.commission_amount || 0).toFixed(2)}</p>
                    <p>📅 ${new Date(item.created_at).toLocaleString()}</p>
                </div>
            `;

        });

    } catch (err) {
        console.log("Referral load error:", err);
    }
}

load();

</script>

</body>
</html>
