<!DOCTYPE html>
<html>
<head>

<title>Smartearn Reset Password</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{

box-sizing:border-box;

}




body{


margin:0;


font-family:


"Segoe UI",
Arial,
sans-serif;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



height:100vh;


display:flex;


justify-content:center;


align-items:center;



color:white;


overflow:hidden;



}







/* BACKGROUND IMAGE */


body::before{


content:"";


position:absolute;


inset:0;



background:


url("/images/index5.jpeg")

no-repeat center;



background-size:cover;



opacity:.35;



z-index:-1;



}








/* TOP BAR */


.topbar{


position:absolute;


top:0;


left:0;


right:0;



padding:20px;


text-align:center;


font-size:22px;


font-weight:bold;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



box-shadow:


0 0 25px cyan;



}








/* WRAPPER */


.wrapper{


width:100%;


display:flex;


justify-content:center;


align-items:center;



min-height:100vh;



}








/* CRYSTAL CARD */


.card{


position:relative;



width:90%;


max-width:370px;



padding:28px 25px;



border-radius:30px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


2px solid rgba(255,255,255,.4);



backdrop-filter:blur(18px);



box-shadow:


0 0 35px rgba(0,198,255,.6),


inset 0 0 25px rgba(255,255,255,.2);



overflow:hidden;



text-align:center;



}





/* CRYSTAL SHINE */


.card::before{


content:"";


position:absolute;


width:90px;


height:220%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-130px;


top:-60px;



animation:


shine 5s infinite;



}




@keyframes shine{


0%{

left:-130px;

}


50%,100%{

left:400px;

}


}
/* INFO TEXT */


.info{


font-size:13px;


line-height:1.5;


color:#e0f7ff;


margin-bottom:15px;



}







/* INPUTS */


input{


width:100%;


padding:14px;


margin-top:12px;



border:none;


outline:none;



border-radius:18px;



background:


rgba(255,255,255,.9);



color:#111;


font-size:14px;



box-shadow:


0 0 15px rgba(0,198,255,.4);



}





input:focus{


box-shadow:


0 0 25px cyan;



}







/* RESET BUTTON */


button{


width:100%;


padding:14px;


margin-top:20px;



border:none;


border-radius:22px;



background:


linear-gradient(
90deg,
#00ffcc,
#0072ff
);



color:white;


font-size:16px;


font-weight:bold;



box-shadow:


0 0 25px cyan;



}



button:active{


transform:scale(.96);


}







/* MESSAGE */


#msg{


margin-top:15px;


font-size:14px;


font-weight:bold;


color:#00ffcc;



}







/* LOGIN LINK */


.link{


display:block;


margin-top:18px;


padding:12px;



border-radius:18px;



background:


linear-gradient(
90deg,
#8a2be2,
#0072ff
);



color:white;



text-decoration:none;



font-size:13px;


font-weight:bold;



box-shadow:


0 0 15px cyan;



}






@media(max-width:600px){


.card{


width:92%;


padding:25px 20px;



}



.topbar{


font-size:20px;


}


}
</style>
</head>

<body>


<div class="topbar">

🔐💎 Reset Password 💎🔐

</div>






<div class="wrapper">


<div class="card">





<div class="info">

🔐 Enter your phone number and create a new password to recover your SmartEarn account.

</div>







<input 

id="phone"

placeholder="📱 Phone Number">






<input 

id="newpass"

type="password"

placeholder="🔒 New Password">






<button onclick="reset()">

💎 RESET PASSWORD

</button>







<p id="msg"></p>







<a href="login.html" class="link">

⬅️ Back to Login

</a>







</div>


</div>


<script>
const API = "https://smartearn.onrender.com";

async function reset(){

    const phone = document.getElementById("phone").value.trim();
    const newpass = document.getElementById("newpass").value.trim();
    const msg = document.getElementById("msg");

    if (!phone || !newpass) {
        msg.style.color = "red";
        msg.innerText = "All fields are required";
        return;
    }

    try {
        const res = await fetch(`${API}/reset-password`, {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                phone,
                newPassword: newpass
            })
        });

        const data = await res.text();

        msg.style.color = res.ok ? "green" : "red";
        msg.innerText = data;

    } catch (err) {
        console.log(err);
        msg.style.color = "red";
        msg.innerText = "Network error";
    }
}
</script>

</body>
</html>
