<!DOCTYPE html>
<html>
<head>

<title>Smartearn Bank Details</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


*{

box-sizing:border-box;

}



body{


margin:0;


font-family:


"Segoe UI",
Arial,
sans-serif;



min-height:100vh;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;



overflow:hidden;



}







/* BACKGROUND IMAGE */


body::before{


content:"";


position:absolute;


inset:0;



background:


url("/images/index3.jpeg")

no-repeat center;



background-size:cover;



opacity:.35;



z-index:-1;



}







/* TOP BAR */


.topbar{


padding:20px;



text-align:center;



font-size:22px;



font-weight:bold;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



box-shadow:


0 0 25px cyan;



}







/* CRYSTAL BANK CARD */


.card{


position:relative;



width:90%;


max-width:400px;



margin:20px auto;



padding:25px;



border-radius:30px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


2px solid rgba(255,255,255,.4);



backdrop-filter:blur(18px);



box-shadow:


0 0 35px rgba(0,198,255,.6),


inset 0 0 25px rgba(255,255,255,.2);



overflow:hidden;



}








/* SHINE EFFECT */


.card::before{


content:"";


position:absolute;


width:90px;


height:220%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-130px;


top:-60px;



animation:


shine 5s infinite;



}




@keyframes shine{


0%{

left:-130px;

}


50%,100%{

left:450px;

}


}

/* INFO BOX */


.info{


background:


rgba(0,198,255,.15);



padding:12px;



border-radius:15px;



font-size:13px;



line-height:1.5;



margin-bottom:15px;



color:#e0f7ff;



}







/* INPUTS */


input{


width:100%;



padding:14px;



margin-top:12px;



border:none;



outline:none;



border-radius:18px;



background:


rgba(255,255,255,.9);



color:#111;



font-size:14px;



box-shadow:


0 0 15px rgba(0,198,255,.4);



}



input:focus{


box-shadow:


0 0 25px cyan;



}







/* SAVE BUTTON */


button{


width:100%;



padding:14px;



margin-top:20px;



border:none;



border-radius:25px;



background:


linear-gradient(
90deg,
#00ffcc,
#0072ff
);



color:white;



font-size:16px;



font-weight:bold;



box-shadow:


0 0 25px cyan;



}



button:active{


transform:scale(.96);



}







/* MESSAGE */


#msg{


text-align:center;



margin-top:15px;



font-size:14px;



font-weight:bold;



color:#00ffcc;



}








/* BOTTOM NAV */


.bottom-nav{


position:fixed;



bottom:0;



left:0;



right:0;



display:flex;



justify-content:space-around;



padding:12px;



background:


rgba(255,255,255,.9);



box-shadow:


0 -5px 20px rgba(0,0,0,.3);



}



.bottom-nav a{


text-decoration:none;



color:#0072ff;



font-size:13px;



font-weight:bold;



}




.space{


height:80px;



}





@media(max-width:600px){


.card{


width:92%;



}



.topbar{


font-size:20px;



}


}
</style>
</head>

<body>



<div class="topbar">

🏦💎 Bank Details Setup

</div>







<div class="card">






<div class="info">

💡 Add your withdrawal bank details for fast and secure payouts.

<br><br>

🔐 Your withdrawal PIN protects your funds.

</div>








<input 

type="text"

id="accountName"

placeholder="👤 Account Name">






<input 

type="text"

id="accountNumber"

placeholder="🏦 Account Number">






<input 

type="text"

id="bankName"

placeholder="💳 Bank Name">






<input 

type="password"

id="pin"

maxlength="4"

placeholder="🔒 4-digit Withdrawal PIN">







<button onclick="saveBank()">

💎 SAVE DETAILS

</button>








<p id="msg"></p>







</div>








<div class="space"></div>







<div class="bottom-nav">


<a href="dashboard.html">

🏠 Home

</a>



<a href="Withdraw.html">

💸 Withdraw

</a>



</div>

<script>
const API_BASE = "https://smartearn.onrender.com";

const user = JSON.parse(localStorage.getItem("user"));

if (!user || !user.phone) {
    window.location.href = "login.html";
}

function saveBank() {

    const account_name = document.getElementById("accountName").value;
    const account_number = document.getElementById("accountNumber").value;
    const bank_name = document.getElementById("bankName").value;
    const pin = document.getElementById("pin").value;

    const msg = document.getElementById("msg");

    if (!account_name || !account_number || !bank_name || !pin) {
        msg.style.color = "red";
        msg.innerText = "All fields required";
        return;
    }

    if (pin.length !== 4) {
        msg.style.color = "red";
        msg.innerText = "PIN must be 4 digits";
        return;
    }

    fetch(`${API_BASE}/bank-details`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            phone: user.phone,
            account_name,
            account_number,
            bank_name,
            withdraw_pin: pin
        })
    })
    .then(res => res.json())
    .then(data => {
        msg.style.color = "green";
        msg.innerText = data.message || data.error;
    })
    .catch(err => {
        msg.style.color = "red";
        msg.innerText = "Error saving details";
    });
}
</script>

</body>
</html>
