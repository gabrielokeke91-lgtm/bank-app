<!DOCTYPE html>
<html>
<head>

<title>Smartearn Deposit</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;


    background:

    linear-gradient(
    135deg,
    #050b2c,
    #182848,
    #000814
    );


    color:white;

    overflow-x:hidden;

}




/* TOP BAR */


.topbar{


    padding:18px;


    text-align:center;


    font-size:22px;


    font-weight:bold;



    background:


    linear-gradient(
    90deg,
    #00c6ff,
    #0072ff
    );



    box-shadow:


    0 0 25px cyan;



}







/* MAIN CARD */


.card{


    position:relative;


    margin:15px;


    padding:20px;



    border-radius:25px;



    background:


    linear-gradient(
    145deg,
    rgba(255,255,255,.35),
    rgba(255,255,255,.05)
    );



    border:


    2px solid rgba(255,255,255,.35);



    backdrop-filter:blur(15px);



    box-shadow:


    0 0 25px rgba(0,198,255,.45),


    inset 0 0 20px rgba(255,255,255,.15);



    overflow:hidden;



}



/* CRYSTAL SHINE */


.card::before{


    content:"";


    position:absolute;


    width:80px;


    height:200%;



    background:


    rgba(255,255,255,.35);



    transform:

    rotate(35deg);



    left:-120px;


    top:-60px;



    animation:


    shine 5s infinite;



}



@keyframes shine{


0%{

left:-120px;

}


50%,100%{

left:350px;

}


}





/* BANK BOX */


.bank-box{


    padding:15px;


    border-radius:18px;


    margin-bottom:15px;



    background:


    rgba(0,198,255,.15);



    border:


    1px solid rgba(255,255,255,.3);



    box-shadow:


    0 0 15px cyan;



    font-size:14px;



}

/* INPUT FIELDS */


input{


    width:100%;


    padding:14px;


    margin-top:12px;



    border:none;


    outline:none;



    border-radius:15px;



    background:


    rgba(255,255,255,.9);



    color:#111;



    font-size:15px;



    box-shadow:


    0 0 10px rgba(0,198,255,.4);



}





input:focus{


    box-shadow:


    0 0 20px cyan;



}






/* DEPOSIT BUTTON */


button{


    width:100%;


    padding:14px;


    margin-top:18px;



    border:none;



    border-radius:20px;



    background:


    linear-gradient(
    90deg,
    #00ffcc,
    #0072ff
    );



    color:white;


    font-size:16px;


    font-weight:bold;



    box-shadow:


    0 0 20px cyan;



}





button:active{


    transform:scale(.96);



}





/* MESSAGE */


#msg{


    margin-top:15px;


    text-align:center;


    font-size:14px;


    font-weight:bold;



    color:#00ffcc;



}







/* LABEL TEXT */


label{


    color:white;


    font-weight:bold;


    font-size:14px;



}





/* BOTTOM NAVIGATION */


.bottom-nav{


    position:fixed;


    bottom:0;


    left:0;


    right:0;



    display:flex;


    justify-content:space-around;



    padding:10px 5px;



    background:


    rgba(255,255,255,.9);



    backdrop-filter:blur(15px);



    box-shadow:


    0 -5px 25px rgba(0,198,255,.5);



    z-index:9999;



}





.bottom-nav a{


    flex:1;


    text-align:center;



    text-decoration:none;


    color:#0072ff;



    font-size:11px;


    font-weight:bold;



}





.bottom-nav span{


    display:block;


    font-size:18px;


    margin-bottom:3px;



}







/* CONTENT SPACE */


.space{


    height:90px;



}







/* MOBILE OPTIMIZATION */


@media(max-width:600px){



.topbar{


    font-size:20px;



}



.card{


    margin:12px;


    padding:18px;



}




button{


    font-size:15px;



}



}

</style>
</head>

<body>


<!-- TOP BAR -->

<div class="topbar">

💎 Smartearn Deposit 💎

</div>




<div class="card">


<h3>
💰 Deposit Wallet
</h3>




<div class="bank-box">


<b>
💎 Minimum Deposit:
</b>

₦1,000


<br><br>


<b>
🏦 Bank:
</b>

Momo Payment Service Bank


<br><br>


<b>
💳 Account:
</b>

7061778390



</div>





<label>

Deposit Amount

</label>


<input 
type="number" 
id="amount" 
placeholder="Enter amount">





<label>

Upload Payment Receipt

</label>


<input 
type="file" 
id="receipt">






<button onclick="deposit()">

💎 Confirm Deposit

</button>





<p id="msg"></p>



</div>







<div class="space"></div>





<!-- MOBILE BOTTOM NAV -->


<div class="bottom-nav">


<a href="dashboard.html">

<span>
🏠
</span>

HOME

</a>




<a href="deposit.html">

<span>
💰
</span>

DEPOSIT

</a>




<a href="products.html">

<span>
💎
</span>

PRODUCTS

</a>




<a href="Transactions.html">

<span>
📊
</span>

HISTORY

</a>



</div>



</body>

<script>

const API = "https://smartearn.onrender.com";

const user = JSON.parse(localStorage.getItem("user"));

function deposit() {

    const amount = document.getElementById("amount").value.trim();
    const receipt = document.getElementById("receipt").files[0];
    const msg = document.getElementById("msg");

    if (!user || !user.phone) {
        window.location.href = "login.html";
        return;
    }

    if (!amount || !receipt) {
        msg.innerText = "Amount and receipt required";
        msg.style.color = "red";
        return;
    }

    const formData = new FormData();
    formData.append("phone", user.phone);
    formData.append("amount", amount);
    formData.append("receipt", receipt);

    fetch(`${API}/deposit`, {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {
        msg.style.color = "green";
        msg.innerText = data;
    })
    .catch(err => {
        console.log(err);
        msg.style.color = "red";
        msg.innerText = "Network error";
    });
}

</script>

</body>
</html>
