<!DOCTYPE html>
<html>
<head>

<title>Smartearn Interest History</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
box-sizing:border-box;
}



body{


margin:0;


font-family:


"Segoe UI",
Arial,
sans-serif;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;


overflow-x:hidden;


}






/* TOP BAR */


.topbar{


background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;


padding:20px;



text-align:center;


font-size:22px;


font-weight:bold;



box-shadow:


0 0 25px cyan;



}







/* CONTAINER */


.container{


padding:15px;


}






/* CRYSTAL CARD */


.card{


position:relative;


border-radius:25px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


2px solid rgba(255,255,255,.35);



backdrop-filter:blur(15px);



box-shadow:


0 0 25px rgba(0,198,255,.45),


inset 0 0 20px rgba(255,255,255,.15);



overflow:hidden;



}






/* SHINE EFFECT */


.card::before{


content:"";


position:absolute;


width:80px;


height:200%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-120px;


top:-50px;



animation:


shine 5s infinite;



}




@keyframes shine{


0%{

left:-120px;

}


50%,100%{

left:350px;

}


}





/* TABLE */


table{


width:100%;


border-collapse:collapse;



}





th{


background:


rgba(0,198,255,.2);



color:white;


padding:13px;


font-size:12px;


text-align:left;



}





td{


padding:13px;


font-size:13px;


color:white;


border-bottom:


1px solid rgba(255,255,255,.15);



}

/* INTEREST AMOUNT */


.credit{


color:#00ff88;


font-weight:bold;


font-size:16px;



text-shadow:


0 0 10px #00ff88;



}





.date{


font-size:12px;


color:#d8eaff;



}







/* EMPTY STATE */


.empty{


text-align:center;


padding:25px;


color:#ddd;


font-size:14px;



}






/* BACK BUTTON (OPTIONAL) */


.back-btn{


margin:15px;


width:calc(100% - 30px);



padding:14px;


border:none;


border-radius:20px;



background:


linear-gradient(
90deg,
#8a2be2,
#0072ff
);



color:white;


font-size:15px;


font-weight:bold;



box-shadow:


0 0 20px cyan;



}







/* BOTTOM NAV */


.bottom-nav{


position:fixed;


bottom:0;


left:0;


right:0;



display:flex;


justify-content:space-around;



padding:10px 5px;



background:


rgba(255,255,255,.9);



backdrop-filter:blur(15px);



box-shadow:


0 -5px 25px rgba(0,198,255,.5);



z-index:9999;



}





.bottom-nav a{


flex:1;


text-align:center;


text-decoration:none;


color:#0072ff;


font-size:11px;


font-weight:bold;



}





.bottom-nav span{


display:block;


font-size:18px;



}





.space{


height:90px;



}






@media(max-width:600px){


th,td{


padding:10px;


font-size:11px;


}



.topbar{


font-size:20px;


}


}
</style>
</head>

<body>


<div class="topbar">

📈💎 Interest History 💎📈

</div>





<div class="container">


<div class="card">


<table>


<thead>


<tr>

<th>
Date
</th>


<th>
Invested
</th>


<th>
Interest
</th>


</tr>


</thead>





<tbody id="history">


<tr>


<td colspan="3" class="empty">

Loading...

</td>


</tr>


</tbody>





</table>


</div>


</div>







<div class="space"></div>







<!-- BOTTOM NAV -->


<div class="bottom-nav">


<a href="dashboard.html">

<span>
🏠
</span>

HOME

</a>




<a href="deposit.html">

<span>
💰
</span>

DEPOSIT

</a>




<a href="products.html">

<span>
💎
</span>

PRODUCTS

</a>




<a href="Transactions.html">

<span>
📊
</span>

HISTORY

</a>




<a href="login.html">

<span>
🚪
</span>

EXIT

</a>



</div>

<script>

const API = "https://smartearn.onrender.com";

const user = JSON.parse(localStorage.getItem("user"));

if (!user || !user.phone) {
    window.location.href = "login.html";
}

fetch(`${API}/interest-history?phone=${user.phone}`)
.then(res => res.json())
.then(data => {

    const tbody = document.getElementById("history");
    tbody.innerHTML = "";

    if (!data || !data.length) {
        tbody.innerHTML = `
            <tr>
                <td colspan="3" class="empty">No interest history yet</td>
            </tr>
        `;
        return;
    }

    data.forEach(item => {

        tbody.innerHTML += `
            <tr>
                <td>
                    <div>${new Date(item.created_at).toLocaleDateString()}</div>
                    <div class="date">${new Date(item.created_at).toLocaleTimeString()}</div>
                </td>
                <td>₦${Number(item.amount || 0).toFixed(2)}</td>
                <td class="credit">₦${Number(item.interest || 0).toFixed(2)}</td>
            </tr>
        `;
    });

})
.catch(err => {

    console.log(err);

    document.getElementById("history").innerHTML = `
        <tr>
            <td colspan="3" class="empty">Failed to load data</td>
        </tr>
    `;
});

function goDashboard() {
    window.location.href = "dashboard.html";
}

</script>

</body>
</html>
