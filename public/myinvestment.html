<!DOCTYPE html>
<html>
<head>

<title>Smartearn My Investments</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


*{

box-sizing:border-box;

}




body{


margin:0;


padding:15px;



font-family:


"Segoe UI",
Arial,
sans-serif;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



color:white;



overflow-x:hidden;



}







/* PAGE TITLE */


.section{


margin-bottom:30px;


}




.title{


font-size:20px;


font-weight:bold;


margin-bottom:15px;



text-shadow:


0 0 10px cyan;



}







/* CRYSTAL INVESTMENT BOX */


.box{


position:relative;



padding:18px;



border-radius:25px;



margin-bottom:15px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


2px solid rgba(255,255,255,.35);



backdrop-filter:blur(15px);



box-shadow:


0 0 25px rgba(0,198,255,.45),


inset 0 0 20px rgba(255,255,255,.15);



overflow:hidden;



}





/* SHINE EFFECT */


.box::before{


content:"";


position:absolute;


width:80px;


height:200%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-120px;


top:-50px;



animation:


shine 5s infinite;



}




@keyframes shine{


0%{

left:-120px;

}


50%,100%{

left:350px;

}


}







/* ACTIVE INVESTMENTS */


.active{


border-left:


5px solid #00ff88;



box-shadow:


0 0 25px #00ff88;



}







/* EXPIRED INVESTMENTS */


.expired{


border-left:


5px solid #ff3366;



box-shadow:


0 0 25px #ff3366;



}
/* INVESTMENT TEXT */


.box p{


margin:8px 0;


font-size:14px;



color:white;



}



.box span{


color:#00ffff;


font-weight:bold;



}







/* ACTIVE / EXPIRED LABEL */


.active::after{


content:"RUNNING";


position:absolute;


top:15px;


right:15px;



background:


rgba(0,255,136,.2);



color:#00ff88;


padding:5px 12px;


border-radius:20px;


font-size:11px;


font-weight:bold;



box-shadow:


0 0 10px #00ff88;



}




.expired::after{


content:"COMPLETED";


position:absolute;


top:15px;


right:15px;



background:


rgba(255,51,102,.2);



color:#ff6688;


padding:5px 12px;


border-radius:20px;


font-size:11px;


font-weight:bold;



box-shadow:


0 0 10px #ff3366;



}







/* DASHBOARD BUTTON */


.back-btn{


position:fixed;



bottom:20px;


left:50%;


transform:translateX(-50%);



padding:14px 22px;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;



text-decoration:none;



border-radius:25px;



font-size:13px;



font-weight:bold;



box-shadow:


0 0 25px cyan;



z-index:9999;



}





.back-btn:active{


transform:translateX(-50%) scale(.95);


}







@media(max-width:600px){



.title{


font-size:18px;


}



.box{


padding:15px;


}



}
</style>
</head>
<body>



<!-- BACK TO DASHBOARD -->


<a href="dashboard.html" class="back-btn">

🏠 Back to Dashboard

</a>






<!-- ACTIVE INVESTMENTS -->


<div class="section">


<div class="title">

🟢 Active Investments (Running)

</div>




<div id="activeBox">


<div class="box active">


<p>

Loading active investments...

</p>


</div>



</div>



</div>








<!-- EXPIRED INVESTMENTS -->


<div class="section">


<div class="title">

🔴 Expired Investments (Completed)

</div>




<div id="expiredBox">


<div class="box expired">


<p>

Loading completed investments...

</p>


</div>



</div>



</div>


<script>
const API = "https://smartearn.onrender.com";
const user = JSON.parse(localStorage.getItem("user"));

async function loadInvestments() {

    // ACTIVE
    const activeRes = await fetch(`${API}/api/investments/active?phone=${user.phone}`);
    const activeData = await activeRes.json();

    const activeBox = document.getElementById("activeBox");
    activeBox.innerHTML = "";

    activeData.forEach(inv => {
        activeBox.innerHTML += `
            <div class="box active">
                💰 ₦${inv.amount}<br>
                        <p>📊 Status: ${inv.status}</p>
                        <p>📅 Started: ${inv.start_date}</p>
                        <p>📅 End: ${inv.end_date}</p>
                
            </div>
        `;
    });

    // EXPIRED
    const expiredRes = await fetch(`${API}/api/investments/expired?phone=${user.phone}`);
    const expiredData = await expiredRes.json();

    const expiredBox = document.getElementById("expiredBox");
    expiredBox.innerHTML = "";

    expiredData.forEach(inv => {
        expiredBox.innerHTML += `
            <div class="box expired">
                💰 ₦${inv.amount}<br>
                <p>📅 End: ${inv.end_date}</p>
                ❌ Expired
            </div>
        `;
    });
}

loadInvestments();
</script>
<script>
// INVESTMENT PAGE CONTROLLER (CLEAN VERSION)

(function () {

    const user = JSON.parse(localStorage.getItem("user"));
    const phone = user?.phone;

    if (!phone) {
        console.log("No user phone found");
        return;
    }

    let intervalId = null;

    async function loadActive() {
        try {
            const res = await fetch(`/api/investments/active?phone=${phone}`);
            const data = await res.json();

            const container = document.getElementById("activeInvestments");
            if (!container) return;

            container.innerHTML = "";

            if (!data || data.length === 0) {
                container.innerHTML = "<p>No active investments</p>";
                return;
            }

            data.forEach(inv => {
                container.innerHTML += `
                    <div class="card active">
                        <p>💰 Amount: ₦${inv.amount}</p>
                         <p>💰 Interest: ₦${inv.interest_rate}</p>
                        <p>📊 Status: ${inv.status}</p>
                        <p>📅 Started: ${inv.start_date}</p>
                        <p>📅 End: ${inv.end_date}</p>
                    </div>
                `;
            });

        } catch (err) {
            console.log("Active load error:", err);
        }
    }

    async function loadExpired() {
        try {
            const res = await fetch(`/api/investments/expired?phone=${phone}`);
            const data = await res.json();

            const container = document.getElementById("expiredInvestments");
            if (!container) return;

            container.innerHTML = "";

            if (!data || data.length === 0) {
                container.innerHTML = "<p>No expired investments</p>";
                return;
            }

            data.forEach(inv => {
                container.innerHTML += `
                    <div class="card expired">
                        <p>💰 Amount: ₦${inv.amount}</p>
                        <p>⛔ Status: Expired</p>
                        <p>📅 Ended: ${inv.end_date}</p>
                    </div>
                `;
            });

        } catch (err) {
            console.log("Expired load error:", err);
        }
    }

    function loadAll() {
        loadActive();
        loadExpired();
    }

    // FIRST LOAD
    window.addEventListener("load", loadAll);

    // 🔥 OPTIONAL AUTO REFRESH (SAFE VERSION - EVERY 30 SECONDS)
    intervalId = setInterval(loadAll, 30000);

    // CLEANUP (VERY IMPORTANT)
    window.addEventListener("beforeunload", () => {
        if (intervalId) clearInterval(intervalId);
    });

})();
</script>

</body>
</html>
