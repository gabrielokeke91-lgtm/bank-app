<!DOCTYPE html>
<html>
<head>

<title>SmartEarn App</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>


*{

box-sizing:border-box;

}



body{


margin:0;


font-family:


"Segoe UI",
Arial,
sans-serif;



background:


linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);



height:100vh;


display:flex;


justify-content:center;


align-items:center;



color:white;


overflow:hidden;



}







/* BACKGROUND IMAGE */


body::before{


content:"";


position:absolute;


inset:0;



background:


url("/images/index2.jpeg")

no-repeat center;



background-size:cover;



opacity:.35;



z-index:-1;



}








/* MAIN CRYSTAL CARD */


.container{


position:relative;



width:90%;


max-width:400px;



padding:35px 25px;



border-radius:35px;



background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border:


2px solid rgba(255,255,255,.4);



backdrop-filter:blur(20px);



box-shadow:


0 0 40px rgba(0,198,255,.7),


inset 0 0 30px rgba(255,255,255,.2);



text-align:center;



overflow:hidden;



}







/* CRYSTAL SHINE */


.container::before{


content:"";


position:absolute;


width:100px;


height:250%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-150px;


top:-80px;



animation:


shine 5s infinite;



}




@keyframes shine{


0%{

left:-150px;

}


50%,100%{

left:450px;

}


}

/* APP TITLE */


h1{


font-size:30px;


margin-bottom:10px;



color:white;



text-shadow:


0 0 20px cyan;



}







.container p{


font-size:14px;


line-height:1.6;


color:#e0f7ff;



}







/* BUTTONS */


button{


width:100%;


padding:15px;


margin:10px 0;



border:none;


border-radius:25px;



font-size:16px;


font-weight:bold;



cursor:pointer;



transition:.3s;



}




.login{


background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



color:white;



box-shadow:


0 0 25px cyan;



}




.signup{


background:


linear-gradient(
90deg,
#00ff88,
#00c853
);



color:white;



box-shadow:


0 0 25px #00ff88;



}





button:active{


transform:scale(.95);



}







/* FOOTER */


.footer{


margin-top:20px;



font-size:13px;



color:#d9faff;



line-height:1.5;



}





@media(max-width:600px){



.container{


width:92%;


padding:30px 20px;



}



h1{


font-size:25px;


}



}
</style>
</head>

<body>



<div class="container">





<h1>

💎 SMARTEARN APP

</h1>






<p>

Secure Banking • Investments • Withdrawals • Referral Earnings

</p>








<button class="login" onclick="goLogin()">

🔐 Login

</button>







<button class="signup" onclick="goSignup()">

✨ Create Account

</button>







<div class="footer">


💎 Earn smart through investments and referral rewards


<br><br>


Secure • Transparent • Reliable


</div>







</div>

<script>
const API = "https://smartearn.onrender.com";

function goLogin(){
    window.location.href = "login.html";
}

function goSignup(){
    window.location.href = "signup.html";
}
</script>

</body>
</html>
