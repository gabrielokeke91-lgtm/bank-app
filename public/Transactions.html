<!DOCTYPE html>
<html>
<head>
<head>

<title>Smartearn Transactions</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
box-sizing:border-box;
}



body{

margin:0;

font-family:
"Segoe UI",
Arial,
sans-serif;


background:

linear-gradient(
135deg,
#050b2c,
#182848,
#000814
);


color:white;

overflow-x:hidden;


}




/* TOP BAR */


.topbar{


padding:18px;


text-align:center;


font-size:22px;


font-weight:bold;



background:


linear-gradient(
90deg,
#00c6ff,
#0072ff
);



box-shadow:


0 0 25px cyan;



}






/* CONTAINER */


.container{


padding:15px;



}







/* CRYSTAL CARD */


.card{


position:relative;


background:


linear-gradient(
145deg,
rgba(255,255,255,.35),
rgba(255,255,255,.05)
);



border-radius:25px;



border:

2px solid rgba(255,255,255,.35);



backdrop-filter:blur(15px);



box-shadow:


0 0 25px rgba(0,198,255,.45),


inset 0 0 20px rgba(255,255,255,.15);



overflow:hidden;


}





/* SHINE EFFECT */


.card::before{


content:"";


position:absolute;


width:80px;


height:200%;



background:


rgba(255,255,255,.35);



transform:


rotate(35deg);



left:-120px;


top:-50px;



animation:


shine 5s infinite;



}



@keyframes shine{


0%{

left:-120px;

}


50%,100%{

left:350px;

}


}





/* TABLE */


table{


width:100%;


border-collapse:collapse;



}





th{


background:


rgba(0,198,255,.2);



color:white;


font-size:12px;


padding:12px;


text-align:left;



}





td{


padding:12px;


font-size:13px;


border-bottom:


1px solid rgba(255,255,255,.15);



color:white;



}




tr:hover{


background:


rgba(0,198,255,.15);



}

/* STATUS BADGES */


.status{


padding:6px 12px;


border-radius:20px;


font-size:11px;


font-weight:bold;



display:inline-block;



}



.success{


background:


rgba(0,255,120,.2);



color:#00ff88;



box-shadow:


0 0 10px #00ff88;



}



.pending{


background:


rgba(255,220,0,.2);



color:#ffe600;



box-shadow:


0 0 10px #ffe600;



}



.failed{


background:


rgba(255,0,80,.2);



color:#ff6688;



box-shadow:


0 0 10px #ff3366;



}






/* EMPTY MESSAGE */


.empty{


text-align:center;


padding:25px;


color:#ddd;


font-size:14px;



}





/* BACK BUTTON */


.back-btn{


margin:15px;


width:calc(100% - 30px);


padding:14px;


border:none;


border-radius:20px;



background:


linear-gradient(
90deg,
#8a2be2,
#0072ff
);



color:white;


font-size:15px;


font-weight:bold;



box-shadow:


0 0 20px cyan;



}






.back-btn:active{


transform:scale(.96);



}






/* BOTTOM NAV */


.bottom-nav{


position:fixed;


bottom:0;


left:0;


right:0;



display:flex;


justify-content:space-around;



padding:10px 5px;



background:


rgba(255,255,255,.9);



backdrop-filter:blur(15px);



box-shadow:


0 -5px 25px rgba(0,198,255,.5);



z-index:9999;



}





.bottom-nav a{


flex:1;


text-align:center;


text-decoration:none;


color:#0072ff;


font-size:11px;


font-weight:bold;



}





.bottom-nav span{


display:block;


font-size:18px;



}





.space{


height:90px;



}





@media(max-width:600px){


th,td{


font-size:11px;


padding:10px;



}



.topbar{


font-size:20px;


}


}

<body>


<div class="topbar">

💎 Smartearn Transactions 💎

</div>





<div class="container">


<div class="card">


<table>


<thead>


<tr>

<th>
Type
</th>


<th>
Amount
</th>


<th>
Status
</th>


<th>
Date
</th>


</tr>


</thead>





<tbody id="txnBody">


<tr>

<td colspan="4" class="empty">

Loading...

</td>


</tr>


</tbody>




</table>


</div>


</div>







<button class="back-btn" onclick="goBack()">

⬅️ Back to Dashboard

</button>








<div class="space"></div>






<!-- BOTTOM NAV -->


<div class="bottom-nav">


<a href="dashboard.html">

<span>
🏠
</span>

HOME

</a>




<a href="deposit.html">

<span>
💰
</span>

DEPOSIT

</a>




<a href="products.html">

<span>
💎
</span>

PRODUCTS

</a>




<a href="Transactions.html">

<span>
📊
</span>

HISTORY

</a>




<a href="login.html">

<span>
🚪
</span>

EXIT

</a>



</div>



</body>
<script>
const API = "https://smartearn.onrender.com";

const user = JSON.parse(localStorage.getItem("user"));

if (!user || !user.phone) {
    window.location.href = "login.html";
}

async function loadTransactions() {

    try {
        const res = await fetch(`${API}/transactions/${user.phone}`);
        const data = await res.json();

        const tbody = document.getElementById("txnBody");
        tbody.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="4" class="empty">No transactions yet</td>
                </tr>
            `;
            return;
        }

        data.forEach(txn => {

            let statusClass = "pending";

            if (txn.status === "success") statusClass = "success";
            if (txn.status === "rejected") statusClass = "failed";
            if (txn.status === "approved") statusClass = "success";

            tbody.innerHTML += `
                <tr>
                    <td>${txn.type}</td>
                    <td>₦${txn.amount}</td>
                    <td><span class="status ${statusClass}">${txn.status}</span></td>
                    <td>${new Date(txn.created_at).toLocaleString()}</td>
                </tr>
            `;
        });

    } catch (err) {
        console.log("Transaction load error:", err);
    }
}

function goBack(){
    window.location.href = "dashboard.html";
}

loadTransactions();
</script>

</body>
</html>
