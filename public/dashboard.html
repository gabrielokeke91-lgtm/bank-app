<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f7fb;
    background: 
     linear-gradient(135deg,#f5f7fb,#dcecff);

    overflow-x:hidden;
}


/* HEADER */

.header{

    background:linear-gradient(135deg,#0099ff,#0066cc);
    color:rgb(217, 194, 194);
    padding:18px;
    

}

.header {
    display: flex;
    align-items: center;
}

.profile-icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    overflow: hidden;
}

.profile-icon img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* 3D WELCOME DESIGN */

.welcome-box{

    margin-top:8px;

    font-size:10px;

    font-weight:bold;

    letter-spacing:1px;

    text-shadow:
    2px 2px 0px rgba(0,0,0,0.25),
    4px 4px 8px rgba(0,0,0,0.25);

}


.welcome-text{

    color:#ffffff;

}



.user-number{

    display:inline-block;

    margin-left:5px;

    font-weight:bold;

    font-size:11px;

    background:linear-gradient(
        45deg,
        #fff3a0,
        #ffcc00,
        #ffffff
    );

    /* Standard property */
    background-clip:text;

    /* Chrome, Safari */
    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

    text-shadow:
    2px 3px 5px rgba(0,0,0,0.35);

    letter-spacing:1px;

}


/* MOBILE SIZE */

@media(max-width:600px){

.welcome-box{

    font-size:20px;

}

}

.welcome-box{
    animation: welcomeGlow 2s infinite alternate;
}


@keyframes welcomeGlow{

from{
transform:translateY(0);
}

to{
transform:translateY(-3px);
}

}

/* ADVERT */

.dashboard-ad{

    width:100%;
    padding:10px 15px;

}


.dashboard-ad img{

    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.15);

}



/* CONTAINER */

.container{

    width:100%;
    max-width:600px;
    margin:auto;
    padding:15px;
    padding-bottom:130px;

}



/* GRID */

.grid{

    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:12px;

}



.card{

    background:skyblue;
    padding:12px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
    min-height: 120;
    
}


.full{

    grid-column:span 2;

}



.card h2{

    font-size:14px;
    margin:0;
    color:#555;

}



.value{

    font-size:20px;
    font-weight:bold;
    margin-top:8px;

}



#balance{

    color:#8b4513;

}


#totalInvested{

    color:#d4af37;

}


.returns{

    color:#00c853;

}



/* GENERAL BUTTON */

button{

    padding:12px;
    border:none;
    border-radius:10px;
    background:#0099ff;
    color:white;
    font-weight:bold;
    cursor:pointer;

}



/* DEPOSIT & WITHDRAW BUTTON AREA */

.action-buttons{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
    margin:10px 0 15px;

}


.action-buttons button{

    width:130px;
    height:60px;
    border-radius:15px;
    font-size:14px;

}


/* BONUS + REFERRAL HORIZONTAL */

.bonus-ref-row{

    display:flex;
    justify-content:center;
    align-items:center;
    gap:8px;
    margin-top:10px;
    margin-bottom: 20px;
}


/* SMALL BONUS RECTANGLE */

#bonusBox{

    width:150spx;
    height:120px;

    background:#fff3cd;

    padding:5px;

    border-radius:10px;

    box-shadow:0 2px 6px rgba(0,0,0,.15);

    font-size:10px;

}



#bonusBox b{

    font-size:11px;

}


#bonusBox input{

    width:100%;

    height:22px;

    padding:3px;

    font-size:10px;

    border-radius:4px;

}



#bonusBox button{

    width:55px;

    height:22px;

    padding:2px;

    font-size:10px;

    margin-top:3px;

}




/* SMALL REFERRAL RECTANGLE */

.ref-box{

    width: 150px;

    height:85px;

    background:white;

    padding:5px;

    border-radius:8px;

    box-shadow:0 2px 6px rgba(0,0,0,.1);

}



.ref-box h3{

    font-size:11px;

    margin:2px 0 5px;

}



.ref-box input{

    width:100%;

    height:22px;

    padding:3px;

    font-size:9px;

    border-radius:4px;

}



.ref-box button{

    width:60px;

    height:22px;

    padding:2px;

    font-size:10px;

    margin-top:5px;

}



/* MOBILE */

@media(max-width:600px){

.bonus-ref-row{

    gap:5px;

}


#bonusBox{

    width:45%;

    height:80px;

}


.ref-box{

    width:50%;

    height:80px;

}

}

/* NORMAL BUTTON LINKS */


.action-links{

    text-align:center;
    padding:10px;
    margin-bottom:80 ;
}


.about-btn,
.help-btn,
.myinvestment-btn{

    display:inline-block;

    padding:12px 12px;

    border-radius:20px;

    text-decoration:none;

    color:white;

    font-size:12px;

    font-weight:bold;

    margin:5px;

}



.about-btn{

    background:#876026;

}



.help-btn{

    background:#53ed6d;

}



.myinvestment-btn{

    background:#53ed6d;

}




/* BOTTOM NAV */


.bottom-nav{

    position:fixed;

    bottom:0;

    left:0;

    right:0;

    background:#bfc3ce;

    display:flex;

    justify-content:space-around;

    padding:5px;

    z-index:9999;

}



.bottom-nav a{

    flex:1;

    text-align:center;

    text-decoration:none;

    color:#333;

    font-size:9px;

}



.bottom-nav span{

    display:block;

    font-size:14px;

}



/* TIME */


.top-time{

    position:fixed;

    top:5px;

    right:5px;

    background:rgb(247, 233, 233);

    padding:5px;

    border-radius:8px;

    font-size:10px;

    z-index:999;

}



/* MOBILE */

@media(max-width:600px){

.grid{

    grid-template-columns:1fr;

}


.full{

    grid-column:span 1;

}

.dashboard-ad img{

    height:150px;

}


.action-buttons button{

    width:120px;
    height:55px;

}


.container{

    padding: bottom 80px;

}

}
.dashboard-ad img{

    width:100%;
    height:170px;
    object-fit:cover;

    border-radius:15px;

    transition:opacity 1s ease;

}


/* AVIATOR TOP BUTTON */

.aviator-top-banner{

    width:220px;
    height:55px;

    margin:8px auto;

    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;

    border-radius:18px;

    background:
    linear-gradient(
    135deg,
    rgba(255,255,255,0.35),
    rgba(0,180,255,0.15)
    );

    border:1px solid rgba(255,255,255,0.5);

    box-shadow:
    0 8px 25px rgba(0,0,0,0.35),
    inset 0 0 15px rgba(255,255,255,0.4);

    backdrop-filter:blur(10px);

    cursor:pointer;

    overflow:hidden;

}



.crystal-cube{

    width:45px;
    height:45px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:25px;

    border-radius:12px;

    background:

    linear-gradient(
    145deg,
    #ffffff,
    #00bfff,
    #0066ff
    );

    box-shadow:

    inset 5px 5px 10px rgba(255,255,255,.8),
    inset -5px -5px 10px rgba(0,0,0,.3),
    0 0 20px #00bfff;

}



.aviator-text{

    display:flex;
    flex-direction:column;
    text-align:left;

}


.aviator-text strong{

    color:#ffd700;

    font-size:16px;

}


.aviator-text span{

    color:white;

    font-size:11px;

}



.aviator-top-banner:hover{

    transform:scale(1.03);

    transition:.3s;

}

</style>
</head>

<body>

<!-- HEADER + AVIATOR FEATURE -->

<div class="welcome-card">


    <!-- USER HEADER -->

    <div class="header">


        <div class="profile-icon">

            <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
            alt="Profile">

        </div>



        <div class="welcome-box">

            <span class="welcome-text">
                Welcome
            </span>


            <span id="welcome" class="user-number"></span>

        </div>


    </div>

    <!-- AVIATOR GAME BUTTON -->
<div class="aviator-top-banner" onclick="openAviator()">

    <div class="crystal-cube">

        ✈️

    </div>

    <div class="aviator-text">

        <strong>Aviator</strong>
        <span>Play Game & Earn Money</span>

    </div>

</div>


<!-- DASHBOARD ADVERT -->

<div class="dashboard-ad">

<img id="advertImage"
src="images/investment1.jpeg"
alt="smartearnAdvert">

</div>



<div class="top-time">

<div id="date"></div>

<div id="time"></div>

</div>




<div class="container">


<div class="grid">


<div class="card">

<h2>Balance</h2>

<div class="value" id="balance">₦0</div>

</div>

<div class="balance-card">
    <h4>Referral Amount</h4>
    <h2>₦<span id="referralAmount">0</span></h2>
</div>

<div class="card">

<h2>Returns</h2>

<div class="value returns" id="returns">₦0</div>

</div>




<div class="card full">

<h2>Total Invested</h2>

<div class="value" id="totalInvested">₦0</div>

</div>


</div>



<!-- DEPOSIT AND WITHDRAW -->

<div class="action-buttons">

<button onclick="location.href='deposit.html'">
💰 Deposit
</button>


<button onclick="location.href='Withdraw.html'">
💸 Withdraw
</button>

</div>




<!-- BONUS + REFERRAL ROW -->

<div class="bonus-ref-row">


<div id="bonusBox">

<b>🎁 Bonus</b>

<br><br>

<input id="bonusCode" placeholder="Enter code">

<br><br>

<button onclick="claimBonus()">
Accept
</button>

</div>



<div class="ref-box">

<h3>Referral Link</h3>

Copy Link
</button>

</div>


</div>





<!-- NORMAL BUTTON AREA -->

<div class="action-links">

About

</a>

<script>

const API="https://smartearn.onrender.com";



document.addEventListener("DOMContentLoaded",()=>{


const user=JSON.parse(localStorage.getItem("user"));



if(!user || !user.phone){

window.location.href="login.html";

return;

}



document.getElementById("welcome").innerText=user.phone;




function formatMoney(amount){

return Number(amount || 0).toLocaleString();

}





async function loadBalance(){

try{

const res=await fetch(`${API}/balance/${user.phone}`);

const data=await res.json();


document.getElementById("balance").innerText=
"₦"+formatMoney(data.balance);


}catch(err){

console.log("Balance error:",err);

}

}





async function loadReturns(){

try{

fetch(`${API}/referral-amount/${user.phone}`)
.then(res=>res.json())
.then(data=>{

    document.getElementById("referralAmount").innerHTML =
    Number(data.referral_amount).toLocaleString();

});

const res=await fetch(`${API}/returns/${user.phone}`);

const data=await res.json();


document.getElementById("returns").innerText=
"₦"+formatMoney(data.returns || data.total);


}catch(err){

console.log("Returns error:",err);

}

}





async function loadInvested(){

try{

const res=await fetch(`${API}/total-invested/${user.phone}`);

const data=await res.json();


document.getElementById("totalInvested").innerText=
"₦"+formatMoney(data.total);


}catch(err){

console.log("Investment error:",err);

}

}





loadBalance();

loadReturns();

loadInvested();



setInterval(loadBalance,5000);

setInterval(loadReturns,5000);

setInterval(loadInvested,5000);


});







// REFERRAL


const userRef=JSON.parse(localStorage.getItem("user"));


if(userRef && userRef.referral_code){

const ref=document.getElementById("refLink");


if(ref){

ref.value=
`${location.origin}/signup.html?ref=${userRef.referral_code}`;

}

}





function copyLink(){

const input=document.getElementById("refLink");

input.select();

navigator.clipboard.writeText(input.value);

alert("Referral link copied");

}







// TIME


function updateTime(){

const now=new Date();


document.getElementById("date").innerText=
now.toLocaleDateString();



document.getElementById("time").innerText=
now.toLocaleTimeString();


}


updateTime();

setInterval(updateTime,1000);








// BONUS


async function claimBonus(){


const code=document.getElementById("bonusCode").value;


const user=JSON.parse(localStorage.getItem("user"));



try{


const res=await fetch(`${API}/claim-bonus`,{

method:"POST",

headers:{
"Content-Type":"application/json"
},


body:JSON.stringify({

userId:user.id,

code

})


});


const msg=await res.text();


alert(msg);



}catch(err){

alert("Bonus failed");

}


}


function openAviator(){

    window.location.href="aviator.html";

}
</script>

<script>
    // ELECTRONIC BILLBOARD ADVERT SLIDER

const adverts = [

"images/investment1.jpeg",

"images/investment6.jpeg",

"images/investment2.jpeg",

"images/investment3.jpeg",

"images/investment4.jpeg",

"images/investment7.jpeg",

"images/investment5.jpeg"

];


let advertIndex = 0;


setInterval(()=>{


advertIndex++;


if(advertIndex >= adverts.length){

advertIndex = 0;

}



document.getElementById("advertImage").src =
adverts[advertIndex];


},10000); // change every 10 seconds
</script>


</body>
