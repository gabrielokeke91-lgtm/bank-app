<!DOCTYPE html>
<html>

<head>

<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;

    background:

    radial-gradient(
    circle at top,
    #b026ff,
    #4b0082 40%,
    #12002b
    );

    color:white;

    overflow-x:hidden;

}



/* HEADER */

.header{

    display:flex;

    align-items:center;

    gap:12px;

    padding:18px;


    background:

    linear-gradient(
    135deg,
    rgba(255,255,255,.35),
    rgba(138,43,226,.35)
    );


    backdrop-filter:blur(15px);


    border-bottom:

    1px solid rgba(255,255,255,.4);


    box-shadow:

    0 10px 35px rgba(0,0,0,.4);

}



/* PROFILE ICON */

.profile-icon{

    width:45px;

    height:45px;

    border-radius:50%;

    overflow:hidden;


    border:

    2px solid white;


    box-shadow:

    0 0 20px #e0b0ff;

}


.profile-icon img{

    width:100%;

    height:100%;

    object-fit:cover;

}



/* WELCOME */

.welcome-box{

    animation:
    welcomeFloat 2s infinite alternate;

}


@keyframes welcomeFloat{

from{

transform:translateY(0);

}


to{

transform:translateY(-4px);

}

}



.welcome-text{

    font-size:18px;

    font-weight:bold;

}



.user-number{

    margin-left:5px;

    font-size:14px;

    font-weight:bold;


    background:

    linear-gradient(
    90deg,
    #ffffff,
    #ffd700,
    #e0c3fc
    );


    background-clip:text;

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

}

/* BOTTOM NAV */  
  
  
.bottom-nav{  
  
    position:fixed;  
  
    bottom:0;  
  
    left:0;  
  
    right:0;  
  
    background:#bfc3ce;  
  
    display:flex;  
  
    justify-content:space-around;  
  
    padding:5px;  
  
    z-index:9999;  
  
}  
  
  
  
.bottom-nav a{  
  
    flex:1;  
  
    text-align:center;  
  
    text-decoration:none;  
  
    color:#333;  
  
    font-size:9px;  
  
}  
  
  
  
.bottom-nav span{  
  
    display:block;  
  
    font-size:14px;  
  
}  
  
/* TIME */  
  
  
.top-time{  
  
    position:fixed;  
  
    top:5px;  
  
    right:5px;  
  
    background:rgb(53, 186, 30);  
  
    padding:5px;  
  
    border-radius:8px;  
  
    font-size:10px;  
  
    z-index:999;  
  
}  

.card{  
  
    background:diamond;  
    padding:12px;  
    border-radius:15px;  
    box-shadow:0 5px 15px rgba(32, 224, 160, 0.08);  
    min-height: 120;  
      
}  
  
  
.full{  
  
    grid-column:span 2;  
  
}  
  
  
  
.card h2{  
  
    font-size:14px;  
    margin:0;  
    color:#555;  
  
}  
  
  
  
.value{  
  
    font-size:20px;  
    font-weight:bold;  
    margin-top:8px;  
  
}  
  
  
  
#balance{  
  
    color:#8b4513;  
  
}  
  
  
#totalInvested{  
  
    color:#d4af37;  
  
}  
  
  
.returns{  
  
    color:#00c853;  
  
}  
.referralwallet{  
  
    color:#00c851;  
  
}  

/* DEPOSIT & WITHDRAW BUTTON AREA */  
  
.action-buttons{  
  
    display:flex;  
    justify-content:left;  
    align-items:left;  
    gap:12px;  
    margin:10px 0 15px;  
  
}  
  
  
.action-buttons button{  
  
    width:115px;  
    height:30px;  
    border-radius:15px;  
    font-size:14px;  
  
}  
  
.about-btn,  
.help-btn,  
.myinvestment-btn{  
  
    display:inline-block;  
  
    padding:12px 12px;  
  
    border-radius:20px;  
  
    text-decoration:none;  
  
    color:white;  
  
    font-size:12px;  
  
    font-weight:bold;  
  
    margin:5px;  
  
}  
  
  
  
.about-btn{  
  
    background:#876076;  
  
}  
  
  
  
.help-btn{  
  
    background:#53ed0d;  
  
}  
  
  
  
.myinvestment-btn{  
  
    background:#53ed8d;  
  
}  
  
  

/* AVIATOR CRYSTAL BUTTON */






</style>

</head>


<body>


<!-- HEADER -->

<div class="header">


<div class="profile-icon">

<img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
alt="Profile">

</div>



<div class="welcome-box">

<span class="welcome-text">
Welcome
</span>


<span id="welcome" class="user-number"></span>


</div>


</div>





<!-- ADVERTISEMENT -->

<div class="dashboard-ad">

<img id="advertImage"
src="images/investment1.jpeg"
alt="Investment Advert">

</div>



<!-- TIME -->

<div class="top-time">

<div id="date"></div>

<div id="time"></div>

</div>




<!-- MAIN CONTAINER -->

<div class="container">


<div class="grid">



<!-- BALANCE -->

<div class="card">

<h2>
💰 Main Balance
</h2>


<div class="value" id="balance">
₦0
</div>


</div>
</div>



<!-- REFERRAL WALLET -->

<div class="balance-card">


<h4>
🔗 Referral Wallet
</h4>


<h2>

₦<span id="referralAmount">
0
</span>

</h2>


</div>




<!-- RETURNS -->

<div class="card">


<h2>
📈 Total Returns
</h2>


<div class="value returns" id="returns">

₦0

</div>


</div>





<!-- TOTAL INVESTED -->


<div class="card full">


<h2>
💎 Total Invested
</h2>


<div class="value" id="totalInvested">

₦0

</div>


</div>



</div>

<!-- ACTION BUTTONS -->

<div class="action-buttons">


<button onclick="location.href='deposit.html'">

💰 Deposit

</button>



<button onclick="location.href='Withdraw.html'">

💸 Withdraw

</button>



</div>




<!-- BONUS + REFERRAL -->

<div class="bonus-ref-row">



<!-- BONUS BOX -->

<div id="bonusBox">


<b>
🎁 Bonus Center
</b>


<br><br>


<input 
id="bonusCode"
placeholder="Enter bonus code">


<br><br>


<button onclick="claimBonus()">

Accept

</button>



</div>





<!-- REFERRAL BOX -->


<div class="ref-box">


<h3>

🔗 Referral Link

</h3>



<input 
id="refLink"
readonly>



<br><br>


<button onclick="copyLink()">

Copy

</button>



</div>




</div>






<!-- OTHER LINKS -->

<div class="action-links">



<a href="about.html" 
class="about-btn">

About

</a>




<a href="help.html"
class="help-btn">

Forum

</a>





<a href="myinvestment.html"
class="myinvestment-btn">

MY 🛍️ INVESTMENT

</a>



</div>

<!-- BOTTOM NAVIGATION -->

<div class="bottom-nav">


<a href="deposit.html">

<span>💰</span>

DEP

</a>



<a href="products.html">

<span>💎</span>

PRODUCT

</a>




<a href="Transactions.html">

<span>📊</span>

HISTORY

</a>




<a href="referral-commission.html">

<span>🔗</span>

REF

</a>




<a href="Interest-history.html">

<span>📈</span>

INTEREST

</a>




<a href="login.html">

<span>🚪</span>

OUT

</a>



</div>




</div>
<!-- END CONTAINER -->





<style>


/* MOBILE RESPONSIVE */

@media(max-width:600px){


.grid{

grid-template-columns:repeat(2,1fr);

gap:10px;

}



.card,
.balance-card{

padding:14px;

min-height:110px;

}




.value{

font-size:20px;

}



.dashboard-ad img{

height:140px;

}



.bottom-nav a{

font-size:8px;

}



}



</style>

<script>

const API="https://smartearn.onrender.com";



document.addEventListener("DOMContentLoaded",()=>{


const user=JSON.parse(localStorage.getItem("user"));



if(!user || !user.phone){

window.location.href="login.html";

return;

}



document.getElementById("welcome").innerText=user.phone;



function formatMoney(amount){

return Number(amount || 0).toLocaleString();

}




// LOAD BALANCE

async function loadBalance(){

try{


const res=await fetch(`${API}/balance/${user.phone}`);


const data=await res.json();



document.getElementById("balance").innerText=

"₦"+formatMoney(data.balance);



}catch(err){

console.log("Balance error:",err);

}


}





// LOAD RETURNS + REFERRAL WALLET

async function loadReturns(){


try{


const refRes=await fetch(
`${API}/referral-amount/${user.phone}`
);


const refData=await refRes.json();



document.getElementById("referralAmount").innerText=

formatMoney(refData.referral_amount);



const res=await fetch(
`${API}/returns/${user.phone}`
);



const data=await res.json();



document.getElementById("returns").innerText=

"₦"+formatMoney(data.returns || data.total);



}catch(err){

console.log("Returns error:",err);

}


}






// LOAD TOTAL INVESTMENT

async function loadInvested(){


try{


const res=await fetch(
`${API}/total-invested/${user.phone}`
);



const data=await res.json();



document.getElementById("totalInvested").innerText=

"₦"+formatMoney(data.total);



}catch(err){

console.log("Investment error:",err);

}


}





loadBalance();

loadReturns();

loadInvested();





setInterval(loadBalance,5000);

setInterval(loadReturns,5000);

setInterval(loadInvested,5000);



});







// REFERRAL LINK


const userRef=JSON.parse(localStorage.getItem("user"));



if(userRef && userRef.referral_code){


const ref=document.getElementById("refLink");



if(ref){


ref.value=

`${location.origin}/signup.html?ref=${userRef.referral_code}`;


}


}






function copyLink(){


const input=document.getElementById("refLink");


input.select();


navigator.clipboard.writeText(input.value);



alert("Referral link copied");


}








// TIME


function updateTime(){


const now=new Date();



document.getElementById("date").innerText=

now.toLocaleDateString();



document.getElementById("time").innerText=

now.toLocaleTimeString();



}



updateTime();


setInterval(updateTime,1000);








// BONUS


async function claimBonus(){


const code=document.getElementById("bonusCode").value;


const user=JSON.parse(localStorage.getItem("user"));



try{


const res=await fetch(`${API}/claim-bonus`,{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({

userId:user.id,

code:code


})


});



const msg=await res.text();



alert(msg);



}catch(err){


alert("Bonus failed");


}


}







// AVIATOR


function openAviator(){


window.location.href="aviator.html";


}



</script>





<script>


// ADVERTISEMENT SLIDER


const adverts=[


"images/investment1.jpeg",

"images/investment6.jpeg",

"images/investment2.jpeg",

"images/investment3.jpeg",

"images/investment4.jpeg",

"images/investment7.jpeg",

"images/investment5.jpeg"


];



let advertIndex=0;



setInterval(()=>{


advertIndex++;


if(advertIndex>=adverts.length){


advertIndex=0;


}



document.getElementById("advertImage").src=

adverts[advertIndex];



},10000);



</script>


</body>

</html>
