<!DOCTYPE html>
<html>
<head>

<title>Smartearn Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
    box-sizing:border-box;
}


body{

    margin:0;

    font-family:
    "Segoe UI",
    Arial,
    sans-serif;


    background:

    linear-gradient(
    135deg,
    #050b2c,
    #182848,
    #000814
    );


    color:white;

    overflow-x:hidden;

}



/* TOP HEADER */

.header{


    display:flex;

    align-items:center;

    gap:15px;

    padding:18px;


    background:

    linear-gradient(
    145deg,
    rgba(255,255,255,.35),
    rgba(0,198,255,.15)
    );


    backdrop-filter:blur(15px);


    border-bottom:

    1px solid rgba(255,255,255,.4);


    box-shadow:

    0 0 25px rgba(0,198,255,.5);


}



/* PROFILE */

.profile-icon{


    width:50px;

    height:50px;

    border-radius:50%;


    overflow:hidden;


    border:

    2px solid white;


    box-shadow:

    0 0 20px cyan;


}



.profile-icon img{

    width:100%;

    height:100%;

    object-fit:cover;

}



/* WELCOME */

.welcome-text{

    font-size:20px;

    font-weight:bold;

}



.user-number{


    margin-left:5px;


    background:

    linear-gradient(
    90deg,
    cyan,
    white,
    gold
    );


    -webkit-background-clip:text;

    color:transparent;


    font-weight:bold;

}



/* ADVERTISEMENT */


.dashboard-ad{


    padding:15px;


}



.dashboard-ad img{


    width:100%;


    height:160px;


    object-fit:cover;


    border-radius:22px;


    box-shadow:


    0 0 25px cyan;


}



/* TIME */


.top-time{


    position:fixed;


    top:10px;


    right:10px;


    background:


    rgba(0,255,100,.8);


    padding:6px;


    border-radius:10px;


    font-size:10px;


    z-index:999;

}

/* MAIN DASHBOARD GRID */


.container{

    padding:15px;

}



.grid{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:15px;

}




/* CRYSTAL CARD */


.card,
.balance-card{


    position:relative;


    padding:18px 12px;


    border-radius:25px;



    background:


    linear-gradient(
    145deg,
    rgba(255,255,255,.35),
    rgba(255,255,255,.05)
    );



    border:

    2px solid rgba(255,255,255,.35);



    backdrop-filter:blur(15px);



    box-shadow:


    0 0 25px rgba(0,198,255,.45),


    inset 0 0 20px rgba(255,255,255,.15);



    overflow:hidden;



}



/* SHINING EFFECT */


.card::before,
.balance-card::before{


    content:"";


    position:absolute;


    width:70px;


    height:200%;


    background:


    rgba(255,255,255,.35);



    transform:

    rotate(35deg);



    left:-120px;


    top:-50px;



    animation:

    crystalShine 5s infinite;



}




@keyframes crystalShine{


0%{

left:-120px;

}


50%,100%{

left:300px;

}


}




/* CARD TITLES */


.card h2,
.balance-card h4{


    font-size:14px;


    color:white;


    margin:0;



    text-shadow:

    0 0 8px cyan;


}





/* VALUES */


.value{


    margin-top:12px;


    font-size:22px;


    font-weight:bold;



    color:white;


    text-shadow:


    0 0 10px cyan;



}





/* MAIN BALANCE COLOR */


#balance{


    color:#00ffff;


}





/* INVESTMENT */


#totalInvested{


    color:#ffd700;


}





/* RETURNS */


.returns{


    color:#00ff88;


}





/* REFERRAL WALLET */


.referralwallet{


    color:#ff66ff;


}



#referralAmount{


    color:#00ffcc;


    font-size:22px;


    font-weight:bold;


}





/* FULL WIDTH CARD */


.full{


    grid-column:span 2;


}




/* ACTION BUTTONS */


.action-buttons{


    display:flex;


    justify-content:center;


    gap:15px;


    padding:10px 15px;


}




.action-buttons button{


    width:130px;


    height:40px;


    border:none;


    border-radius:20px;



    background:


    linear-gradient(
    90deg,
    #00ffcc,
    #0072ff
    );



    color:white;


    font-weight:bold;


    box-shadow:


    0 0 15px cyan;



}



.action-buttons button:active{


    transform:scale(.95);


}



/* OTHER LINKS */


.action-links{


    text-align:center;


    padding:10px;


}



.about-btn,
.help-btn,
.myinvestment-btn{


    display:inline-block;


    padding:12px 15px;


    margin:5px;


    border-radius:20px;


    text-decoration:none;


    color:white;


    font-size:12px;


    font-weight:bold;



    background:


    linear-gradient(
    90deg,
    #8a2be2,
    #00c6ff
    );



    box-shadow:


    0 0 15px cyan;



}

/* BONUS AND REFERRAL ROW */


.bonus-ref-row{


    display:grid;


    grid-template-columns:repeat(2,1fr);


    gap:15px;


    padding:15px;


}



/* BONUS BOX */


#bonusBox,
.ref-box{


    position:relative;


    padding:15px;


    border-radius:22px;


    background:


    linear-gradient(
    145deg,
    rgba(255,255,255,.3),
    rgba(255,255,255,.05)
    );


    border:

    2px solid rgba(255,255,255,.35);



    backdrop-filter:blur(12px);



    box-shadow:


    0 0 25px rgba(0,255,255,.35);



    text-align:center;



}



#bonusBox b,
.ref-box h3{


    color:white;


    font-size:16px;


    text-shadow:


    0 0 10px cyan;



}




/* INPUT STYLE */


#bonusCode,
#refLink{


    width:100%;


    padding:10px;


    border:none;


    border-radius:15px;


    outline:none;



    background:


    rgba(255,255,255,.9);



    color:#111;


}




/* BUTTON */


#bonusBox button,
.ref-box button{


    width:100%;


    margin-top:10px;


    padding:10px;


    border:none;


    border-radius:15px;



    background:


    linear-gradient(
    90deg,
    #00ffcc,
    #0072ff
    );



    color:white;


    font-weight:bold;


    box-shadow:


    0 0 15px cyan;


}



/* BOTTOM NAVIGATION */


.bottom-nav{


    position:fixed;


    bottom:0;


    left:0;


    right:0;


    display:flex;


    justify-content:space-around;


    padding:10px 5px;



    background:


    rgba(255,255,255,.85);



    backdrop-filter:blur(15px);



    box-shadow:


    0 -5px 25px rgba(0,198,255,.5);



    z-index:9999;



}





.bottom-nav a{


    flex:1;


    text-align:center;


    text-decoration:none;


    color:#0072ff;


    font-size:9px;


    font-weight:bold;



}




.bottom-nav span{


    display:block;


    font-size:18px;


    margin-bottom:3px;



}





/* EMPTY SPACE FOR NAV */


.space{


    height:90px;


}





/* MOBILE RESPONSIVE */


@media(max-width:600px){



.grid{


    grid-template-columns:repeat(2,1fr);


}



.card,
.balance-card{


    min-height:120px;


}



.value{


    font-size:19px;


}



.dashboard-ad img{


    height:140px;


}



.bonus-ref-row{


    grid-template-columns:1fr;


}



.action-buttons button{


    width:120px;


}



}

<body>

<script>

const API="https://smartearn.onrender.com";



document.addEventListener("DOMContentLoaded",()=>{


const user=JSON.parse(localStorage.getItem("user"));



if(!user || !user.phone){

window.location.href="login.html";

return;

}



document.getElementById("welcome").innerText=user.phone;



function formatMoney(amount){

return Number(amount || 0).toLocaleString();

}




// LOAD BALANCE

async function loadBalance(){

try{


const res=await fetch(`${API}/balance/${user.phone}`);


const data=await res.json();



document.getElementById("balance").innerText=

"₦"+formatMoney(data.balance);



}catch(err){

console.log("Balance error:",err);

}


}





// LOAD RETURNS + REFERRAL WALLET

async function loadReturns(){


try{


const refRes=await fetch(
`${API}/referral-amount/${user.phone}`
);


const refData=await refRes.json();



document.getElementById("referralAmount").innerText=

formatMoney(refData.referral_amount);



const res=await fetch(
`${API}/returns/${user.phone}`
);



const data=await res.json();



document.getElementById("returns").innerText=

"₦"+formatMoney(data.returns || data.total);



}catch(err){

console.log("Returns error:",err);

}


}






// LOAD TOTAL INVESTMENT

async function loadInvested(){


try{


const res=await fetch(
`${API}/total-invested/${user.phone}`
);



const data=await res.json();



document.getElementById("totalInvested").innerText=

"₦"+formatMoney(data.total);



}catch(err){

console.log("Investment error:",err);

}


}





loadBalance();

loadReturns();

loadInvested();





setInterval(loadBalance,5000);

setInterval(loadReturns,5000);

setInterval(loadInvested,5000);



});







// REFERRAL LINK


const userRef=JSON.parse(localStorage.getItem("user"));



if(userRef && userRef.referral_code){


const ref=document.getElementById("refLink");



if(ref){


ref.value=

`${location.origin}/signup.html?ref=${userRef.referral_code}`;


}


}






function copyLink(){


const input=document.getElementById("refLink");


input.select();


navigator.clipboard.writeText(input.value);



alert("Referral link copied");


}








// TIME


function updateTime(){


const now=new Date();



document.getElementById("date").innerText=

now.toLocaleDateString();



document.getElementById("time").innerText=

now.toLocaleTimeString();



}



updateTime();


setInterval(updateTime,1000);








// BONUS


async function claimBonus(){


const code=document.getElementById("bonusCode").value;


const user=JSON.parse(localStorage.getItem("user"));



try{


const res=await fetch(`${API}/claim-bonus`,{


method:"POST",


headers:{


"Content-Type":"application/json"


},


body:JSON.stringify({

userId:user.id,

code:code


})


});



const msg=await res.text();



alert(msg);



}catch(err){


alert("Bonus failed");


}


}







// AVIATOR


function openAviator(){


window.location.href="aviator.html";


}



</script>





<script>


// ADVERTISEMENT SLIDER

</script>
